<body>

<script type="text/babel">

  {symbol:"BTC",name:"Bitcoin",cat:"Layer 1"},{symbol:"ETH",name:"Ethereum",cat:"Layer 1"},

  {symbol:"FIL",name:"Filecoin",cat:"Infraestr."},{symbol:"NEAR",name:"NEAR",cat:"Infraestr."},

  {par:"SOL/USDT",tipo:"LONG",qty:5,entrada:165,sl:160,tp:185,salida:158,resultado:"LOSS",fecha:"2025-01-18"},
  {par:"BTC/USDT",tipo:"SHORT",qty:0.03,entrada:68500,sl:69500,tp:65000,salida:65200,resultado:"WIN",fecha:"2025-01-25"},
  {par:"BNB/USDT",tipo:"LONG",qty:2,entrada:560,sl:545,tp:610,salida:605,resultado:"WIN",fecha:"2025-02-02"},
  {par:"ETH/USDT",tipo:"SHORT",qty:0.3,entrada:3400,sl:3500,tp:3100,salida:3450,resultado:"LOSS",fecha:"2025-02-10"},
  {par:"SOL/USDT",tipo:"LONG",qty:8,entrada:140,sl:135,tp:165,salida:162,resultado:"WIN",fecha:"2025-02-18"},
  {par:"BTC/USDT",tipo:"LONG",qty:0.04,entrada:62000,sl:60000,tp:67000,salida:66500,resultado:"WIN",fecha:"2025-02-25"},
];

// ── HELPERS ──────────────────────────────────────────────────
const fmt=n=>{if(!n&&n!==0)return"—";if(n>=1000)return"$"+n.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});if(n>=1)return"$"+n.toFixed(2);if(n>=0.01)return"$"+n.toFixed(4);return"$"+n.toFixed(8)};
const fmtUSD=n=>"$"+(n||0).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtPct=n=>isNaN(n)?"—":(n>=0?"+":"")+n.toFixed(2)+"%";
const calcPnl=t=>{if(!t.entrada||!t.salida||!t.qty)return null;return t.tipo==="LONG"?(parseFloat(t.salida)-parseFloat(t.entrada))*parseFloat(t.qty):(parseFloat(t.entrada)-parseFloat(t.salida))*parseFloat(t.qty);};

// ── SPARKLINE ────────────────────────────────────────────────
function Sparkline({history,positive}){
  if(!history||history.length<2)return<div style={{width:64,height:28}}/>;
  const min=Math.min(...history),max=Math.max(...history),range=max-min||1,w=64,h=28;
  const pts=history.map((v,i)=>`${(i/(history.length-1))*w},${h-((v-min)/range)*(h-4)-2}`).join(" ");
  return<svg width={w} height={h} style={{display:"block"}}><polyline points={pts} fill="none" stroke={positive?"#00C853":"#FF3D00"} strokeWidth="1.5" strokeLinejoin="round" strokeLinecap="round" opacity="0.85"/></svg>;
}

function FlashPrice({price}){
  const[flash,setFlash]=useState(null),prev=useRef(price);
  useEffect(()=>{
    if(prev.current!==price&&prev.current!==undefined){
      setFlash(price>prev.current?"up":"down");
      const t=setTimeout(()=>setFlash(null),600);prev.current=price;return()=>clearTimeout(t);
    }prev.current=price;
  },[price]);
  return<span style={{fontFamily:"Space Mono,monospace",fontSize:15,fontWeight:700,color:"#FFFFFF",background:flash==="up"?"rgba(0,200,83,0.2)":flash==="down"?"rgba(255,61,0,0.2)":"transparent",borderRadius:4,padding:"1px 4px",transition:"background 0.3s"}}>{fmt(price)}</span>;
}

// ── EQUITY CHART ─────────────────────────────────────────────
function EquityChart({trades}){
  const w=500,h=160,pad=40;
  let acum=0;
  const points=[{x:0,y:0,pnl:0}];
  trades.forEach((t,i)=>{const p=calcPnl(t)||0;acum+=p;points.push({x:i+1,y:acum,pnl:p,par:t.par,fecha:t.fecha});});
  const maxY=Math.max(...points.map(p=>p.y),10);
  const minY=Math.min(...points.map(p=>p.y),-10);
  const rangeY=maxY-minY||1;
  const toX=i=>(i/(points.length-1||1))*(w-pad*2)+pad;
  const toY=v=>h-pad-((v-minY)/rangeY)*(h-pad*2);
  const pts=points.map((p,i)=>`${toX(i)},${toY(p.y)}`).join(" ");
  const areaPath=`M${toX(0)},${toY(0)} `+points.map((p,i)=>`L${toX(i)},${toY(p.y)}`).join(" ")+` L${toX(points.length-1)},${h-pad} L${toX(0)},${h-pad} Z`;
  const zero=toY(0);
  const finalColor=acum>=0?"#00C853":"#FF3D00";
  return(
    <div style={{position:"relative"}}>
      <svg width="100%" viewBox={`0 0 ${w} ${h}`} style={{overflow:"visible"}}>
        <defs>
          <linearGradient id="eqGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor={finalColor} stopOpacity="0.3"/>
            <stop offset="100%" stopColor={finalColor} stopOpacity="0.02"/>
          </linearGradient>
        </defs>
        {/* Grid lines */}
        {[0,0.25,0.5,0.75,1].map(f=>{
          const y=pad+(h-pad*2)*f;
          const val=maxY-(rangeY*f);
          return<g key={f}><line x1={pad} y1={y} x2={w-pad} y2={y} stroke="rgba(255,255,255,0.04)" strokeWidth="1"/><text x={pad-6} y={y+4} textAnchor="end" fontSize="9" fill="#444460">${val.toFixed(0)}</text></g>;
        })}
        {/* Zero line */}
        <line x1={pad} y1={zero} x2={w-pad} y2={zero} stroke="rgba(255,255,255,0.15)" strokeWidth="1" strokeDasharray="4,4"/>
        {/* Area */}
        <path d={areaPath} fill="url(#eqGrad)"/>
        {/* Line */}
        <polyline points={pts} fill="none" stroke={finalColor} strokeWidth="2" strokeLinejoin="round" strokeLinecap="round"/>
        {/* Points */}
        {points.slice(1).map((p,i)=>(
          <circle key={i} cx={toX(i+1)} cy={toY(p.y)} r="3" fill={p.pnl>=0?"#00C853":"#FF3D00"} stroke="#07070F" strokeWidth="1.5"/>
        ))}
        {/* Labels */}
        {points.slice(1).map((p,i)=>(
          <text key={i} x={toX(i+1)} y={h-4} textAnchor="middle" fontSize="8" fill="#444460">{p.par?.split("/")[0]}</text>
        ))}
      </svg>
      <div style={{display:"flex",justifyContent:"space-between",marginTop:4,fontSize:14,color:"#CCCCDD"}}>
        <span>Inicio</span>
        <span style={{color:finalColor,fontWeight:700}}>{(acum>=0?"+":"")+"$"+acum.toFixed(2)}</span>
      </div>
    </div>
  );
}

// ── PNL BAR CHART ────────────────────────────────────────────
function PnlBars({trades}){
  const data=trades.map(t=>({pnl:calcPnl(t)||0,par:t.par,fecha:t.fecha,res:t.resultado}));
  const maxAbs=Math.max(...data.map(d=>Math.abs(d.pnl)),1);
  return(
    <div style={{display:"flex",flexDirection:"column",gap:6}}>
      {data.map((d,i)=>{
        const pct=(Math.abs(d.pnl)/maxAbs)*100;
        const isPos=d.pnl>=0;
        return(
          <div key={i} style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:70,fontSize:12,color:"#BBBBCC",textAlign:"right",flexShrink:0}}>{d.par.split("/")[0]}</div>
            <div style={{flex:1,position:"relative",height:20,background:"rgba(255,255,255,0.04)",borderRadius:4,overflow:"hidden"}}>
              <div style={{position:"absolute",top:0,left:0,height:"100%",width:`${pct}%`,background:isPos?"linear-gradient(90deg,#00875A,#00C853)":"linear-gradient(90deg,#C62828,#FF3D00)",borderRadius:4,transition:"width 0.8s ease"}}/>
              <span style={{position:"absolute",right:8,top:"50%",transform:"translateY(-50%)",fontSize:10,fontWeight:700,color:isPos?"#00C853":"#FF3D00",fontFamily:"Space Mono,monospace"}}>
                {(isPos?"+":"")+"$"+d.pnl.toFixed(2)}
              </span>
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ── WIN RATE DONUT ───────────────────────────────────────────
function WinRateDonut({wins,losses}){
  const total=wins+losses||1;
  const pct=wins/total;
  const r=45,cx=60,cy=60,circ=2*Math.PI*r;
  const dash=pct*circ;
  return(
    <div style={{display:"flex",alignItems:"center",gap:20}}>
      <svg width="120" height="120" viewBox="0 0 120 120">
        <circle cx={cx} cy={cy} r={r} fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth="14"/>
        <circle cx={cx} cy={cy} r={r} fill="none" stroke="#FF3D00" strokeWidth="14" strokeDasharray={`${(1-pct)*circ} ${dash}`} strokeDashoffset={circ*0.25} strokeLinecap="round"/>
        <circle cx={cx} cy={cy} r={r} fill="none" stroke="#00C853" strokeWidth="14" strokeDasharray={`${dash} ${circ-dash}`} strokeDashoffset={circ*0.25} strokeLinecap="round"/>
        <text x={cx} y={cy-6} textAnchor="middle" fontSize="18" fontWeight="800" fill="#E8E8F0">{(pct*100).toFixed(0)}%</text>
        <text x={cx} y={cy+12} textAnchor="middle" fontSize="10" fill="#666680">Win Rate</text>
      </svg>
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <div style={{width:10,height:10,borderRadius:"50%",background:"#00C853"}}/>
          <span style={{fontSize:13,color:"#E8E8F0"}}><b>{wins}</b> Ganadas</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <div style={{width:10,height:10,borderRadius:"50%",background:"#FF3D00"}}/>
          <span style={{fontSize:13,color:"#E8E8F0"}}><b>{losses}</b> Perdidas</span>
        </div>
        <div style={{fontSize:14,color:"#CCCCDD"}}>{total} operaciones</div>
      </div>
    </div>
  );
}

// ── DCA CALCULATOR ───────────────────────────────────────────
function DCAPanel({prices}){
  const [par,setPar]=useState("BTC");
  const [capital,setCapital]=useState(1000);
  const [precioActual,setPrecioActual]=useState("");
  const [niveles,setNiveles]=useState([
    {pct:-5,monto:200},{pct:-10,monto:350},{pct:-15,monto:500},{pct:-20,monto:750},{pct:-25,monto:1000}
  ]);
  const [comision,setComision]=useState(0.1);

  const precioBase=precioActual?(parseFloat(precioActual)):(prices[par]||0);

  const rows=niveles.map(n=>{
    const precio=precioBase*(1+n.pct/100);
    const qty=precio>0?n.monto/precio:0;
    const com=n.monto*(comision/100)*2;
    const breakeven=precioBase; // simplified
    const beOk=precio<breakeven;
    return{...n,precio,qty,com,breakeven,beOk};
  });

  const totalInvertido=rows.reduce((s,r)=>s+r.monto,0);
  const totalQty=rows.reduce((s,r)=>s+r.qty,0);
  const precioPromedio=totalQty>0?totalInvertido/totalQty:0;
  const valorActual=totalQty*(precioBase||0);
  const pnlDca=valorActual-totalInvertido;

  return(
    <div style={{animation:"fadeIn 0.3s ease"}}>
      {/* Config row */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(160px,1fr))",gap:14,padding:"24px 0 16px"}}>
        <div style={cardStyle("#F7931A")}>
          <div style={labelStyle}>Par / Moneda</div>
          <select value={par} onChange={e=>setPar(e.target.value)} style={{width:"100%",background:"rgba(247,147,26,0.1)",border:"1px solid rgba(247,147,26,0.3)",borderRadius:6,padding:"8px 10px",color:"#F7931A",fontSize:14,fontWeight:700,outline:"none",marginTop:4}}>
            {COINS.filter(c=>c.symbol!=="USDT").map(c=><option key={c.symbol} value={c.symbol}>{c.symbol}</option>)}
          </select>
        </div>
        <div style={cardStyle("#1D6FD1")}>
          <div style={labelStyle}>Precio Base (USDT)</div>
          <input type="number" value={precioActual||""} placeholder={fmt(precioBase)} onChange={e=>setPrecioActual(e.target.value)} style={{width:"100%",background:"rgba(29,111,209,0.1)",border:"1px solid rgba(29,111,209,0.3)",borderRadius:6,padding:"8px 10px",color:"#1D6FD1",fontSize:14,fontWeight:700,outline:"none",marginTop:4}}/>
          <div style={{fontSize:14,color:"#CCCCDD",marginTop:4}}>Binance: {fmt(prices[par]||0)}</div>
        </div>
        <div style={cardStyle("#00875A")}>
          <div style={labelStyle}>Capital Total DCA</div>
          <input type="number" value={capital} onChange={e=>setCapital(parseFloat(e.target.value)||0)} style={{width:"100%",background:"rgba(0,135,90,0.1)",border:"1px solid rgba(0,135,90,0.3)",borderRadius:6,padding:"8px 10px",color:"#00C853",fontSize:14,fontWeight:700,outline:"none",marginTop:4}}/>
        </div>
        <div style={cardStyle("#7B61FF")}>
          <div style={labelStyle}>Comisión % (ida+vuelta)</div>
          <input type="number" value={comision} step="0.01" onChange={e=>setComision(parseFloat(e.target.value)||0)} style={{width:"100%",background:"rgba(123,97,255,0.1)",border:"1px solid rgba(123,97,255,0.3)",borderRadius:6,padding:"8px 10px",color:"#7B61FF",fontSize:14,fontWeight:700,outline:"none",marginTop:4}}/>
        </div>
      </div>

      {/* Summary cards */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))",gap:12,marginBottom:20}}>
        {[
          {l:"Total Invertido",v:fmtUSD(totalInvertido),c:"#F7931A"},
          {l:"Cantidad Total",v:totalQty.toFixed(6)+" "+par,c:"#E8E8F0"},
          {l:"Precio Promedio",v:fmt(precioPromedio),c:"#1D6FD1"},
          {l:"Valor Actual",v:fmtUSD(valorActual),c:"#00C853"},
          {l:"P&L DCA",v:(pnlDca>=0?"+":"")+fmtUSD(pnlDca),c:pnlDca>=0?"#00C853":"#FF3D00"},
        ].map(({l,v,c})=>(
          <div key={l} style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:10,padding:"12px 14px"}}>
            <div style={{fontSize:14,color:"#CCCCDD",textTransform:"uppercase",letterSpacing:"0.6px",marginBottom:6}}>{l}</div>
            <div style={{fontSize:15,fontWeight:800,color:c,fontFamily:"Space Mono,monospace"}}>{v}</div>
          </div>
        ))}
      </div>

      {/* DCA Levels table */}
      <div style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:14,overflow:"hidden",marginBottom:24}}>
        <div style={{padding:"14px 20px",borderBottom:"1px solid rgba(255,255,255,0.05)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontSize:15,fontWeight:700,color:"#FFFFFF"}}>📊 Escalones DCA — {par}/USDT</span>
          <span style={{fontSize:14,color:"#CCCCDD"}}>Precio base: {fmt(precioBase)}</span>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"60px 90px 100px 100px 80px 90px 90px",padding:"10px 20px",borderBottom:"1px solid rgba(255,255,255,0.04)",fontSize:14,color:"#CCCCDD",textTransform:"uppercase",letterSpacing:"0.6px"}}>
          {["Nivel","Caída %","Precio","Monto $","Cantidad","Comisión","Break-even"].map(h=><div key={h} style={{textAlign:"right",...(h==="Nivel"?{textAlign:"left"}:{})}}>{h}</div>)}
        </div>
        {rows.map((r,i)=>(
          <div key={i} style={{display:"grid",gridTemplateColumns:"60px 90px 100px 100px 80px 90px 90px",padding:"11px 20px",borderBottom:"1px solid rgba(255,255,255,0.03)",background:i%2===0?"transparent":"rgba(255,255,255,0.01)",alignItems:"center"}}>
            <div style={{fontSize:12,fontWeight:700,color:"#F7931A"}}>#{i+1}</div>
            <div style={{textAlign:"right"}}>
              <input type="number" value={r.pct} onChange={e=>{const n=[...niveles];n[i]={...n[i],pct:parseFloat(e.target.value)||0};setNiveles(n);}} style={{width:65,background:"rgba(255,61,0,0.08)",border:"1px solid rgba(255,61,0,0.2)",borderRadius:6,padding:"3px 6px",color:"#FF5722",fontSize:12,textAlign:"right",outline:"none",fontFamily:"Space Mono,monospace"}}/>
              <span style={{color:"#FF5722",fontSize:11}}>%</span>
            </div>
            <div style={{textAlign:"right",fontFamily:"Space Mono,monospace",fontSize:12,color:"#E8E8F0"}}>{fmt(r.precio)}</div>
            <div style={{textAlign:"right"}}>
              <input type="number" value={r.monto} onChange={e=>{const n=[...niveles];n[i]={...n[i],monto:parseFloat(e.target.value)||0};setNiveles(n);}} style={{width:85,background:"rgba(0,135,90,0.08)",border:"1px solid rgba(0,135,90,0.2)",borderRadius:6,padding:"3px 6px",color:"#00C853",fontSize:12,textAlign:"right",outline:"none",fontFamily:"Space Mono,monospace"}}/>
            </div>
            <div style={{textAlign:"right",fontFamily:"Space Mono,monospace",fontSize:11,color:"#AAAACC"}}>{r.qty.toFixed(4)}</div>
            <div style={{textAlign:"right",fontFamily:"Space Mono,monospace",fontSize:11,color:"#7B61FF"}}>{fmtUSD(r.com)}</div>
            <div style={{textAlign:"right"}}>
              <span style={{fontSize:11,fontWeight:700,padding:"3px 8px",borderRadius:20,background:r.beOk?"rgba(0,200,83,0.15)":"rgba(255,61,0,0.15)",color:r.beOk?"#00C853":"#FF3D00"}}>{r.beOk?"✅ OK":"⏳ Espera"}</span>
            </div>
          </div>
        ))}
        <div style={{display:"grid",gridTemplateColumns:"60px 90px 100px 100px 80px 90px 90px",padding:"12px 20px",borderTop:"1px solid rgba(247,147,26,0.2)",background:"rgba(247,147,26,0.04)",alignItems:"center"}}>
          <div style={{fontSize:11,fontWeight:800,color:"#F7931A"}}>TOTAL</div>
          <div/><div/>
          <div style={{textAlign:"right",fontFamily:"Space Mono,monospace",fontSize:13,fontWeight:800,color:"#F7931A"}}>{fmtUSD(totalInvertido)}</div>
          <div style={{textAlign:"right",fontFamily:"Space Mono,monospace",fontSize:11,color:"#AAAACC"}}>{totalQty.toFixed(4)}</div>
          <div style={{textAlign:"right",fontFamily:"Space Mono,monospace",fontSize:11,color:"#7B61FF"}}>{fmtUSD(rows.reduce((s,r)=>s+r.com,0))}</div>
          <div/>
        </div>
      </div>

      {/* Rebalancing table */}
      <RebalanceoPanel prices={prices} par={par} precioBase={precioBase}/>
    </div>
  );
}

// ── REBALANCEO ───────────────────────────────────────────────
function RebalanceoPanel({prices,par,precioBase}){
  const [rebalanceos,setRebalanceos]=useState([
    {exchange:"Binance",saldo:3500,precio:precioBase||65000,objetivo:4000},
    {exchange:"Bybit",saldo:1200,precio:precioBase||65000,objetivo:1500},
    {exchange:"OKX",saldo:800,precio:precioBase||65000,objetivo:1000},
  ]);

  return(
    <div style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:14,overflow:"hidden",marginBottom:24}}>
      <div style={{padding:"14px 20px",borderBottom:"1px solid rgba(255,255,255,0.05)"}}>
        <span style={{fontSize:15,fontWeight:700,color:"#FFFFFF"}}>🔄 Rebalanceo por Exchange</span>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"120px 100px 100px 100px 100px 100px",padding:"10px 20px",borderBottom:"1px solid rgba(255,255,255,0.04)",fontSize:14,color:"#CCCCDD",textTransform:"uppercase",letterSpacing:"0.6px"}}>
        {["Exchange","Saldo $","Objetivo $","Diferencia","Acción","Estado"].map(h=><div key={h} style={{textAlign:"right",...(h==="Exchange"?{textAlign:"left"}:{})}}>{h}</div>)}
      </div>
      {rebalanceos.map((r,i)=>{
        const diff=r.objetivo-r.saldo;
        const accion=diff>0?"COMPRAR":"VENDER";
        const ok=Math.abs(diff)<r.objetivo*0.05;
        return(
          <div key={i} style={{display:"grid",gridTemplateColumns:"120px 100px 100px 100px 100px 100px",padding:"12px 20px",borderBottom:"1px solid rgba(255,255,255,0.03)",alignItems:"center",background:i%2===0?"transparent":"rgba(255,255,255,0.01)"}}>
            <div style={{fontSize:15,fontWeight:700,color:"#FFFFFF"}}>{r.exchange}</div>
            <div style={{textAlign:"right"}}>
              <input type="number" value={r.saldo} onChange={e=>{const n=[...rebalanceos];n[i]={...n[i],saldo:parseFloat(e.target.value)||0};setRebalanceos(n);}} style={{width:85,background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:6,padding:"3px 6px",color:"#E8E8F0",fontSize:12,textAlign:"right",outline:"none",fontFamily:"Space Mono,monospace"}}/>
            </div>
            <div style={{textAlign:"right"}}>
              <input type="number" value={r.objetivo} onChange={e=>{const n=[...rebalanceos];n[i]={...n[i],objetivo:parseFloat(e.target.value)||0};setRebalanceos(n);}} style={{width:85,background:"rgba(247,147,26,0.08)",border:"1px solid rgba(247,147,26,0.2)",borderRadius:6,padding:"3px 6px",color:"#F7931A",fontSize:12,textAlign:"right",outline:"none",fontFamily:"Space Mono,monospace"}}/>
            </div>
            <div style={{textAlign:"right",fontFamily:"Space Mono,monospace",fontSize:12,fontWeight:700,color:diff>=0?"#00C853":"#FF3D00"}}>{(diff>=0?"+":"")+fmtUSD(diff)}</div>
            <div style={{textAlign:"right"}}>
              <span style={{fontSize:11,fontWeight:700,padding:"3px 8px",borderRadius:4,background:accion==="COMPRAR"?"rgba(0,200,83,0.15)":"rgba(255,61,0,0.15)",color:accion==="COMPRAR"?"#00C853":"#FF3D00"}}>{accion}</span>
            </div>
            <div style={{textAlign:"right"}}>
              <span style={{fontSize:11,padding:"3px 8px",borderRadius:20,background:ok?"rgba(0,200,83,0.15)":"rgba(255,183,0,0.15)",color:ok?"#00C853":"#FFB300"}}>{ok?"✅ OK":"⚠️ Rebalancear"}</span>
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ── STYLE HELPERS ────────────────────────────────────────────
const cardStyle=(c="#F7931A")=>({background:"rgba(255,255,255,0.03)",border:`1px solid rgba(255,255,255,0.06)`,borderTop:`3px solid ${c}`,borderRadius:12,padding:"16px 18px"});
const labelStyle={fontSize:13,color:"#BBBBCC",textTransform:"uppercase",letterSpacing:"0.8px"};

// ══════════════════════════════════════════════════════════════
// MAIN APP
// ══════════════════════════════════════════════════════════════
function App(){
  const[prices,setPrices]=useState({});
  const[changes,setChanges]=useState({});
  const[history,setHistory]=useState({});
  const[status,setStatus]=useState("connecting");
  const[reconnects,setReconnects]=useState(0);
  const[quantities,setQuantities]=useState(()=>{const q={};COINS.forEach(c=>q[c.symbol]=0);q.BTC=0.05;q.ETH=0.5;q.SOL=5;q.BNB=2;return q;});
  const[usdtFree,setUsdtFree]=useState(1500);
  const[editMode,setEditMode]=useState(false);
  const[tab,setTab]=useState("dashboard");
  const[sortBy,setSortBy]=useState("value");
  const[filterCat,setFilterCat]=useState("Todas");
  const[trades,setTrades]=useState(SAMPLE_TRADES);
  const[time,setTime]=useState(new Date().toLocaleTimeString("es-ES"));
  const wsRef=useRef(null),mountRef=useRef(true);

  useEffect(()=>{const t=setInterval(()=>setTime(new Date().toLocaleTimeString("es-ES")),1000);return()=>clearInterval(t);},[]);

  const connect=useCallback(()=>{
    if(!mountRef.current)return;setStatus("connecting");
    const syms=COINS.filter(c=>c.symbol!=="USDT").map(c=>`${c.symbol.toLowerCase()}usdt@ticker`).join("/");
    const ws=new WebSocket(`wss://stream.binance.com:9443/stream?streams=${syms}`);wsRef.current=ws;
    ws.onopen=()=>{if(mountRef.current)setStatus("live")};
    ws.onmessage=(e)=>{if(!mountRef.current)return;try{const{data}=JSON.parse(e.data);if(!data)return;const sym=data.s.replace("USDT","");const price=parseFloat(data.c);const chg=parseFloat(data.P);if(!isNaN(price)){setPrices(p=>({...p,[sym]:price}));setChanges(p=>({...p,[sym]:chg}));setHistory(h=>{const arr=[...(h[sym]||[]),price].slice(-30);return{...h,[sym]:arr}});}}catch(e){}};
    ws.onclose=()=>{if(!mountRef.current)return;setStatus("reconnecting");setReconnects(r=>r+1);setTimeout(()=>{if(mountRef.current)connect();},3000);};
  },[]);
  useEffect(()=>{mountRef.current=true;connect();return()=>{mountRef.current=false;if(wsRef.current)wsRef.current.close();};},[connect]);

  const gp=sym=>sym==="USDT"?1:(prices[sym]||0);
  const rows=COINS.map(c=>({...c,price:gp(c.symbol),qty:quantities[c.symbol]||0,value:gp(c.symbol)*(quantities[c.symbol]||0),chg:changes[c.symbol]||0}));
  const btcPrice=prices.BTC||1,totalCoins=rows.reduce((s,r)=>s+r.value,0),totalPort=totalCoins+usdtFree;
  const btcDom=totalPort>0?((quantities.BTC||0)*btcPrice/totalPort)*100:0;
  const totalChg=rows.reduce((s,r)=>s+r.value*(r.chg/100),0),totalChgPct=totalCoins>0?(totalChg/(totalCoins-totalChg))*100:0;
  const cats=["Todas",...new Set(COINS.map(c=>c.cat))];
  let dr=[...rows];
  if(filterCat!=="Todas")dr=dr.filter(r=>r.cat===filterCat);
  if(sortBy==="value")dr.sort((a,b)=>b.value-a.value);
  if(sortBy==="change")dr.sort((a,b)=>b.chg-a.chg);
  if(sortBy==="price")dr.sort((a,b)=>b.price-a.price);
  if(sortBy==="name")dr.sort((a,b)=>a.symbol.localeCompare(b.symbol));
  const sc=status==="live"?"#00C853":status==="connecting"?"#FFB300":"#FF3D00";
  const wins=trades.filter(t=>t.resultado==="WIN").length;
  const losses=trades.filter(t=>t.resultado==="LOSS").length;
  const totalPnl=trades.reduce((s,t)=>s+(calcPnl(t)||0),0);
  const winRate=trades.length>0?(wins/trades.length)*100:0;

  const TABS=[["dashboard","🏦 Dashboard"],["graficos","📊 Gráficos"],["operaciones","🎯 4 Comas"],["dca","💰 Gestión DCA"],["categorias","📂 Categorías"]];

  return(
    <div style={{minHeight:"100vh",background:"#07070F",color:"#E8E8F0",fontFamily:"DM Sans,sans-serif"}}>
      <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,backgroundImage:"linear-gradient(rgba(247,147,26,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(247,147,26,0.03) 1px,transparent 1px)",backgroundSize:"40px 40px",pointerEvents:"none",zIndex:0}}/>
      <div style={{position:"relative",zIndex:1,maxWidth:1400,margin:"0 auto",padding:"0 16px"}}>

        {/* HEADER */}
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"18px 0 14px",borderBottom:"1px solid rgba(247,147,26,0.15)"}}>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <div style={{width:40,height:40,borderRadius:10,background:"linear-gradient(135deg,#F7931A,#E65100)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,fontWeight:900,color:"#fff",boxShadow:"0 0 20px rgba(247,147,26,0.4)"}}>₿</div>
            <div>
              <div style={{fontSize:20,fontWeight:800,color:"#F7931A",letterSpacing:"-0.5px"}}>CryptoPortfolio Pro</div>
              <div style={{fontSize:13,color:"#BBBBCC"}}>Estrategia 4 Comas · Tiempo Real</div>
            </div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <div style={{display:"flex",alignItems:"center",gap:6}}>
              <div style={{width:7,height:7,borderRadius:"50%",background:sc,boxShadow:status==="live"?`0 0 8px ${sc}`:"none",animation:status==="live"?"pulse 2s infinite":"none"}}/>
              <span style={{fontSize:11,color:sc,fontFamily:"Space Mono,monospace"}}>{status==="live"?"BINANCE LIVE":status==="connecting"?"CONECTANDO...":"RECON. ("+reconnects+")"}</span>
            </div>
            <span style={{fontSize:13,color:"#888899",fontFamily:"Space Mono,monospace"}}>{time}</span>
          </div>
        </div>

        {/* TABS */}
        <div style={{display:"flex",gap:4,padding:"14px 0 0",overflowX:"auto",paddingBottom:2}}>
          {TABS.map(([id,label])=>(
            <button key={id} onClick={()=>setTab(id)} className="tab-btn" style={{background:tab===id?"rgba(247,147,26,0.15)":"transparent",color:tab===id?"#F7931A":"#666680",borderBottom:tab===id?"2px solid #F7931A":"2px solid transparent"}}>
              {label}
            </button>
          ))}
        </div>

        {/* ── DASHBOARD ── */}
        {tab==="dashboard"&&(
          <div style={{animation:"fadeIn 0.3s ease"}}>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(180px,1fr))",gap:14,padding:"22px 0 0"}}>
              {[{l:"Total Portafolio",v:fmtUSD(totalPort),s:fmtPct(totalChgPct)+" hoy",c:"#F7931A",sc:totalChgPct>=0?"#00C853":"#FF3D00"},{l:"En Bitcoin",v:(totalPort/btcPrice).toFixed(6)+" BTC",s:"BTC: "+fmtUSD(btcPrice),c:"#E8E8F0"},{l:"Dominancia BTC",v:btcDom.toFixed(1)+"%",s:"de tu portafolio",c:"#1D6FD1"},{l:"USDT Libre",v:fmtUSD(usdtFree),s:((usdtFree/totalPort)*100).toFixed(1)+"% del total",c:"#00C853"},{l:"Monedas Activas",v:rows.filter(r=>r.qty>0).length+" / 30",s:"con saldo",c:"#7B61FF"}].map(({l,v,s,c,sc:sc2})=>(
                <div key={l} style={cardStyle(c)}>
                  <div style={labelStyle}>{l}</div>
                  <div style={{fontSize:20,fontWeight:800,color:c,letterSpacing:"-0.5px",lineHeight:1,marginTop:8}}>{v}</div>
                  <div style={{fontSize:12,color:sc2||"#888899",marginTop:6}}>{s}</div>
                </div>
              ))}
            </div>
            <div style={{marginTop:22,background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:14,overflow:"hidden"}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px 20px",borderBottom:"1px solid rgba(255,255,255,0.05)",flexWrap:"wrap",gap:8}}>
                <span style={{fontSize:13,fontWeight:700}}>Portafolio · {dr.length} activos</span>
                <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
                  {[["value","Valor"],["change","Cambio"],["price","Precio"],["name","A-Z"]].map(([s,l])=><button key={s} onClick={()=>setSortBy(s)} style={{padding:"4px 10px",borderRadius:6,border:"none",cursor:"pointer",fontSize:11,fontWeight:600,background:sortBy===s?"rgba(247,147,26,0.2)":"rgba(255,255,255,0.04)",color:sortBy===s?"#F7931A":"#666680"}}>{l}</button>)}
                  <button onClick={()=>setEditMode(!editMode)} style={{padding:"6px 16px",borderRadius:8,border:"none",cursor:"pointer",fontSize:12,fontWeight:700,background:editMode?"#F7931A":"rgba(247,147,26,0.12)",color:editMode?"#000":"#F7931A"}}>{editMode?"✓ Guardar":"✏ Editar"}</button>
                </div>
              </div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap",padding:"10px 20px",borderBottom:"1px solid rgba(255,255,255,0.04)"}}>
                {cats.map(c=><button key={c} onClick={()=>setFilterCat(c)} style={{padding:"4px 12px",borderRadius:20,border:"none",cursor:"pointer",fontSize:11,fontWeight:600,background:filterCat===c?"#F7931A":"rgba(255,255,255,0.05)",color:filterCat===c?"#000":"#888899"}}>{c}</button>)}
              </div>
              <div style={{display:"grid",gridTemplateColumns:"40px 1fr 110px 120px 100px 75px 70px",padding:"9px 20px",borderBottom:"1px solid rgba(255,255,255,0.04)",fontSize:14,color:"#CCCCDD",textTransform:"uppercase",letterSpacing:"0.6px"}}>
                {["#","Activo","Precio","Valor","Cantidad","24h%","Graf."].map((h,i)=><div key={h} style={{textAlign:i>1?"right":"left"}}>{h}</div>)}
              </div>
              {dr.map((coin,i)=>{
                const wt=totalPort>0?(coin.value/totalPort)*100:0,isPos=coin.chg>=0;
                return(
                  <div key={coin.symbol} className="coin-row" style={{display:"grid",gridTemplateColumns:"40px 1fr 110px 120px 100px 75px 70px",padding:"10px 20px",borderBottom:"1px solid rgba(255,255,255,0.03)",background:i%2===0?"transparent":"rgba(255,255,255,0.01)",alignItems:"center"}}>
                    <div style={{fontSize:13,color:"#888899",fontFamily:"Space Mono,monospace"}}>{(i+1).toString().padStart(2,"0")}</div>
                    <div style={{display:"flex",flexDirection:"column",gap:2}}>
                      <div style={{display:"flex",alignItems:"center",gap:6}}><span style={{fontSize:15,fontWeight:800,letterSpacing:"-0.3px"}}>{coin.symbol}</span><span style={{fontSize:11,fontWeight:700,padding:"3px 8px",borderRadius:20,color:CC[coin.cat]||"#888",background:(CC[coin.cat]||"#888")+"20"}}>{coin.cat}</span></div>
                      <span style={{fontSize:14,color:"#CCCCDD"}}>{coin.name}</span>
                    </div>
                    <div style={{textAlign:"right"}}><FlashPrice price={coin.price}/></div>
                    <div style={{textAlign:"right"}}>
                      <div style={{fontFamily:"Space Mono,monospace",fontSize:13,color:coin.value>0?"#E8E8F0":"#333350",fontWeight:700}}>{fmtUSD(coin.value)}</div>
                      {coin.value>0&&<div style={{fontSize:14,color:"#CCCCDD"}}>{wt.toFixed(1)}%</div>}
                    </div>
                    <div style={{textAlign:"right"}}>{editMode?<input type="number" value={quantities[coin.symbol]||""} placeholder="0" onChange={e=>setQuantities(q=>({...q,[coin.symbol]:parseFloat(e.target.value)||0}))} style={{width:85,background:"rgba(247,147,26,0.08)",border:"1px solid rgba(247,147,26,0.3)",borderRadius:6,padding:"3px 6px",color:"#F7931A",fontSize:12,fontFamily:"Space Mono,monospace",textAlign:"right",outline:"none"}}/>:<span style={{fontFamily:"Space Mono,monospace",fontSize:12,color:coin.qty>0?"#AAAACC":"#333350"}}>{coin.qty>0?coin.qty.toLocaleString("en-US",{maximumFractionDigits:6}):"—"}</span>}</div>
                    <div style={{textAlign:"right",fontFamily:"Space Mono,monospace",fontSize:12,fontWeight:700,color:isPos?"#00C853":"#FF3D00"}}>{coin.symbol!=="USDT"?fmtPct(coin.chg):"—"}</div>
                    <div style={{display:"flex",justifyContent:"flex-end"}}><Sparkline history={history[coin.symbol]} positive={isPos}/></div>
                  </div>
                );
              })}
              <div style={{display:"grid",gridTemplateColumns:"40px 1fr 110px 120px 100px 75px 70px",padding:"13px 20px",borderTop:"1px solid rgba(247,147,26,0.2)",background:"rgba(247,147,26,0.04)",alignItems:"center"}}>
                <div/><div style={{fontSize:12,fontWeight:800,color:"#F7931A"}}>TOTAL PORTAFOLIO</div><div/>
                <div style={{textAlign:"right",fontFamily:"Space Mono,monospace",fontSize:14,fontWeight:800,color:"#F7931A"}}>{fmtUSD(totalPort)}</div>
                <div/><div style={{textAlign:"right",fontFamily:"Space Mono,monospace",fontSize:12,fontWeight:700,color:totalChgPct>=0?"#00C853":"#FF3D00"}}>{fmtPct(totalChgPct)}</div><div/>
              </div>
            </div>
            <div style={{height:40}}/>
          </div>
        )}

        {/* ── GRÁFICOS ── */}
        {tab==="graficos"&&(
          <div style={{animation:"fadeIn 0.3s ease",paddingTop:22}}>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:16}}>
              {/* Equity */}
              <div style={{...cardStyle("#00C853"),gridColumn:"1/-1"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
                  <div>
                    <div style={{fontSize:14,fontWeight:800,color:"#E8E8F0"}}>📈 Curva de Equity</div>
                    <div style={{fontSize:14,color:"#CCCCDD",marginTop:2}}>Ganancias acumuladas por operación</div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontSize:20,fontWeight:800,color:totalPnl>=0?"#00C853":"#FF3D00",fontFamily:"Space Mono,monospace"}}>{(totalPnl>=0?"+":"")+"$"+totalPnl.toFixed(2)}</div>
                    <div style={{fontSize:14,color:"#CCCCDD"}}>P&L Total</div>
                  </div>
                </div>
                <EquityChart trades={trades}/>
              </div>

              {/* Win Rate */}
              <div style={cardStyle("#F7931A")}>
                <div style={{fontSize:14,fontWeight:800,color:"#E8E8F0",marginBottom:16}}>🎯 Win Rate</div>
                <WinRateDonut wins={wins} losses={losses}/>
                <div style={{marginTop:16,display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
                  {[{l:"Win Rate",v:winRate.toFixed(1)+"%",c:"#F7931A"},{l:"Mejor Trade",v:"+$"+Math.max(...trades.map(t=>calcPnl(t)||0)).toFixed(2),c:"#00C853"},{l:"Peor Trade",v:"$"+Math.min(...trades.map(t=>calcPnl(t)||0)).toFixed(2),c:"#FF3D00"}].map(({l,v,c})=>(
                    <div key={l} style={{background:"rgba(255,255,255,0.03)",borderRadius:8,padding:"10px 12px",textAlign:"center"}}>
                      <div style={{fontSize:14,color:"#CCCCDD",marginBottom:4}}>{l}</div>
                      <div style={{fontSize:14,fontWeight:800,color:c,fontFamily:"Space Mono,monospace"}}>{v}</div>
                    </div>
                  ))}
                </div>
              </div>

              {/* P&L Bars */}
              <div style={cardStyle("#1D6FD1")}>
                <div style={{fontSize:14,fontWeight:800,color:"#E8E8F0",marginBottom:16}}>💹 P&L por Operación</div>
                <PnlBars trades={trades}/>
              </div>
            </div>

            {/* Category distribution */}
            <div style={cardStyle("#7B61FF")}>
              <div style={{fontSize:14,fontWeight:800,color:"#E8E8F0",marginBottom:16}}>🗂 Distribución por Categoría</div>
              <div style={{display:"flex",flexDirection:"column",gap:10}}>
                {Object.entries(COINS.reduce((acc,c)=>{if(!acc[c.cat])acc[c.cat]=0;acc[c.cat]+=(quantities[c.symbol]||0)*(gp(c.symbol));return acc;},{})
                  .filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1])
                  .map(([cat,val])=>({cat,val,pct:totalPort>0?(val/totalPort)*100:0}))
                  .map(({cat,val,pct},i,arr)=>{
                    const color=CC[cat]||"#888";
                    return(
                      <div key={cat} style={{display:"flex",alignItems:"center",gap:12}}>
                        <div style={{width:80,fontSize:13,color:"#CCCCDD",textAlign:"right"}}>{cat}</div>
                        <div style={{flex:1,height:22,background:"rgba(255,255,255,0.04)",borderRadius:4,overflow:"hidden",position:"relative"}}>
                          <div style={{position:"absolute",top:0,left:0,height:"100%",width:`${pct*3}%`,maxWidth:"100%",background:color,opacity:0.8,borderRadius:4,transition:"width 0.8s ease"}}/>
                          <span style={{position:"absolute",left:8,top:"50%",transform:"translateY(-50%)",fontSize:11,fontWeight:700,color:"#fff"}}>{fmtUSD(val)}</span>
                        </div>
                        <div style={{width:45,fontSize:12,fontWeight:700,color,fontFamily:"Space Mono,monospace",textAlign:"right"}}>{pct.toFixed(1)}%</div>
                      </div>
                    );
                  }))}
              </div>
            </div>
            <div style={{height:40}}/>
          </div>
        )}

        {/* ── 4 COMAS ── */}
        {tab==="operaciones"&&<FourCommas trades={trades} setTrades={setTrades}/>}

        {/* ── DCA ── */}
        {tab==="dca"&&<DCAPanel prices={prices}/>}

        {/* ── CATEGORÍAS ── */}
        {tab==="categorias"&&<Categories rows={rows} totalPort={totalPort}/>}

      </div>
    </div>
  );
}

// ── 4 COMAS PANEL ────────────────────────────────────────────
function FourCommas({trades,setTrades}){
  const E={par:"",tipo:"LONG",qty:"",entrada:"",sl:"",tp:"",salida:"",resultado:"",fecha:""};
  const[nt,setNt]=useState(E);
  const[showForm,setShowForm]=useState(false);
  const wins=trades.filter(t=>t.resultado==="WIN").length;
  const totalPnl=trades.reduce((s,t)=>s+(calcPnl(t)||0),0);
  const wr=trades.length>0?(wins/trades.length)*100:0;
  return(
    <div style={{animation:"fadeIn 0.3s ease"}}>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:12,padding:"22px 0 0"}}>
        {[{l:"Trades",v:trades.length,c:"#F7931A"},{l:"Ganadas",v:wins,c:"#00C853"},{l:"Perdidas",v:trades.filter(t=>t.resultado==="LOSS").length,c:"#FF3D00"},{l:"Win Rate",v:wr.toFixed(1)+"%",c:wr>=50?"#00C853":"#FF3D00"},{l:"P&L Total",v:(totalPnl>=0?"+":"")+"$"+totalPnl.toFixed(2),c:totalPnl>=0?"#00C853":"#FF3D00"}].map(({l,v,c})=>(
          <div key={l} style={cardStyle(c)}><div style={labelStyle}>{l}</div><div style={{fontSize:20,fontWeight:800,color:c,letterSpacing:"-0.5px",marginTop:8}}>{v}</div></div>
        ))}
      </div>
      <div style={{display:"flex",justifyContent:"flex-end",padding:"18px 0 8px"}}>
        <button onClick={()=>setShowForm(!showForm)} style={{padding:"9px 20px",borderRadius:8,border:"none",cursor:"pointer",fontSize:13,fontWeight:700,background:showForm?"rgba(255,255,255,0.06)":"linear-gradient(135deg,#F7931A,#E65100)",color:showForm?"#888":"#000"}}>{showForm?"✕ Cancelar":"+ Nueva Operación"}</button>
      </div>
      {showForm&&(
        <div style={{background:"rgba(247,147,26,0.05)",border:"1px solid rgba(247,147,26,0.2)",borderRadius:12,padding:20,marginBottom:16,display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:12,animation:"fadeIn 0.2s ease"}}>
          {[["par","Par","BTC/USDT"],["fecha","Fecha","2025-01-01"],["qty","Cantidad","0.05"],["entrada","Entrada","65000"],["sl","Stop Loss","63500"],["tp","Take Profit","68000"],["salida","Salida","67800"]].map(([key,label,ph])=>(
            <div key={key}><div style={{fontSize:13,color:"#BBBBCC",marginBottom:4}}>{label}</div><input style={{width:"100%",background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:6,padding:"7px 10px",color:"#E8E8F0",fontSize:13,outline:"none"}} placeholder={ph} value={nt[key]} onChange={e=>setNt(n=>({...n,[key]:e.target.value}))}/></div>
          ))}
          <div><div style={{fontSize:13,color:"#BBBBCC",marginBottom:4}}>Tipo</div><select style={{width:"100%",background:"#1A1A2E",border:"1px solid rgba(255,255,255,0.1)",borderRadius:6,padding:"7px 10px",color:"#E8E8F0",fontSize:13,outline:"none"}} value={nt.tipo} onChange={e=>setNt(n=>({...n,tipo:e.target.value}))}><option value="LONG">LONG</option><option value="SHORT">SHORT</option></select></div>
          <div><div style={{fontSize:13,color:"#BBBBCC",marginBottom:4}}>Resultado</div><select style={{width:"100%",background:"#1A1A2E",border:"1px solid rgba(255,255,255,0.1)",borderRadius:6,padding:"7px 10px",color:"#E8E8F0",fontSize:13,outline:"none"}} value={nt.resultado} onChange={e=>setNt(n=>({...n,resultado:e.target.value}))}><option value="">—</option><option value="WIN">WIN</option><option value="LOSS">LOSS</option></select></div>
          <div style={{display:"flex",alignItems:"flex-end"}}><button onClick={()=>{if(!nt.par)return;setTrades(t=>[...t,nt]);setNt(E);setShowForm(false);}} style={{width:"100%",padding:8,borderRadius:8,border:"none",cursor:"pointer",fontSize:13,fontWeight:700,background:"linear-gradient(135deg,#00C853,#00875A)",color:"#fff"}}>✓ Agregar</button></div>
        </div>
      )}
      <div style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:14,overflowX:"auto"}}>
        <div style={{display:"grid",gridTemplateColumns:"80px 110px 60px 65px 95px 95px 95px 95px 80px 90px",padding:"10px 16px",borderBottom:"1px solid rgba(255,255,255,0.05)",fontSize:14,color:"#CCCCDD",textTransform:"uppercase",letterSpacing:"0.6px",minWidth:870}}>
          {["Fecha","Par","Tipo","Cant.","Entrada","Stop Loss","Take Profit","Salida","Result.","P&L"].map(h=><div key={h} style={{textAlign:"right",...(h==="Par"||h==="Tipo"?{textAlign:"left"}:{})}}>{h}</div>)}
        </div>
        {trades.map((t,i)=>{const pnl=calcPnl(t);const isWin=t.resultado==="WIN";return(
          <div key={i} style={{display:"grid",gridTemplateColumns:"80px 110px 60px 65px 95px 95px 95px 95px 80px 90px",padding:"10px 16px",alignItems:"center",borderBottom:"1px solid rgba(255,255,255,0.025)",background:i%2===0?"transparent":"rgba(255,255,255,0.01)",minWidth:870}}>
            <div style={{fontSize:13,color:"#888899",fontFamily:"Space Mono,monospace"}}>{t.fecha}</div>
            <div style={{fontSize:13,fontWeight:700}}>{t.par}</div>
            <div style={{fontSize:11,fontWeight:700,padding:"2px 8px",borderRadius:4,textAlign:"center",background:t.tipo==="LONG"?"rgba(0,200,83,0.15)":"rgba(255,61,0,0.15)",color:t.tipo==="LONG"?"#00C853":"#FF3D00"}}>{t.tipo}</div>
            <div style={{textAlign:"right",fontFamily:"Space Mono,monospace",fontSize:14,color:"#CCCCDD"}}>{t.qty}</div>
            <div style={{textAlign:"right",fontFamily:"Space Mono,monospace",fontSize:12,color:"#00C853"}}>${parseFloat(t.entrada).toLocaleString()}</div>
            <div style={{textAlign:"right",fontFamily:"Space Mono,monospace",fontSize:12,color:"#1D6FD1"}}>${parseFloat(t.sl).toLocaleString()}</div>
            <div style={{textAlign:"right",fontFamily:"Space Mono,monospace",fontSize:12,color:"#F7931A"}}>${parseFloat(t.tp).toLocaleString()}</div>
            <div style={{textAlign:"right",fontFamily:"Space Mono,monospace",fontSize:12,color:"#FF3D00"}}>${parseFloat(t.salida).toLocaleString()}</div>
            <div style={{textAlign:"center"}}><span style={{fontSize:11,fontWeight:700,padding:"3px 8px",borderRadius:20,background:isWin?"rgba(0,200,83,0.15)":t.resultado?"rgba(255,61,0,0.15)":"transparent",color:isWin?"#00C853":t.resultado?"#FF3D00":"#555570"}}>{t.resultado||"—"}</span></div>
            <div style={{textAlign:"right",fontFamily:"Space Mono,monospace",fontSize:12,fontWeight:700,color:pnl===null?"#444460":pnl>=0?"#00C853":"#FF3D00"}}>{pnl===null?"—":(pnl>=0?"+":"")+"$"+pnl.toFixed(2)}</div>
          </div>
        );})}
        <div style={{display:"grid",gridTemplateColumns:"80px 110px 60px 65px 95px 95px 95px 95px 80px 90px",padding:"12px 16px",borderTop:"1px solid rgba(247,147,26,0.2)",background:"rgba(247,147,26,0.04)",minWidth:870}}>
          <div style={{gridColumn:"1/9",fontSize:12,fontWeight:800,color:"#F7931A"}}>P&L ACUMULADO</div><div/>
          <div style={{textAlign:"right",fontFamily:"Space Mono,monospace",fontSize:14,fontWeight:800,color:totalPnl>=0?"#00C853":"#FF3D00"}}>{(totalPnl>=0?"+":"")+"$"+totalPnl.toFixed(2)}</div>
        </div>
      </div>
      <div style={{height:40}}/>
    </div>
  );
}

// ── CATEGORIES ───────────────────────────────────────────────
function Categories({rows,totalPort}){
  const bc={};rows.forEach(r=>{if(!bc[r.cat])bc[r.cat]={value:0,coins:[],change:0};bc[r.cat].value+=r.value;bc[r.cat].coins.push(r.symbol);bc[r.cat].change+=r.value*(r.chg/100);});
  return(
    <div style={{animation:"fadeIn 0.3s ease",paddingTop:22}}>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(270px,1fr))",gap:14}}>
        {Object.entries(bc).sort((a,b)=>b[1].value-a[1].value).map(([cat,data])=>{
          const pct=totalPort>0?(data.value/totalPort)*100:0,color=CC[cat]||"#888",chgPct=data.value>0?(data.change/(data.value-data.change))*100:0;
          return(
            <div key={cat} style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.06)",borderLeft:`4px solid ${color}`,borderRadius:12,padding:"16px 18px"}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
                <div><div style={{fontSize:13,fontWeight:800}}>{cat}</div><div style={{fontSize:14,color:"#CCCCDD",marginTop:2}}>{data.coins.slice(0,6).join(" · ")}{data.coins.length>6?" ...":""}</div></div>
                <div style={{textAlign:"right"}}>
                  <div style={{fontSize:15,fontWeight:800,color,fontFamily:"Space Mono,monospace"}}>{pct.toFixed(1)}%</div>
                  <div style={{fontSize:11,color:chgPct>=0?"#00C853":"#FF3D00",marginTop:2}}>{(chgPct>=0?"+":"")+chgPct.toFixed(2)}% hoy</div>
                </div>
              </div>
              <div style={{height:4,background:"rgba(255,255,255,0.05)",borderRadius:2,marginBottom:10}}><div style={{height:4,borderRadius:2,width:`${Math.min(pct*3,100)}%`,background:color}}/></div>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:12}}>
                <span style={{color:"#666680"}}>{data.coins.length} activos</span>
                <span style={{fontFamily:"Space Mono,monospace",fontWeight:700}}>{fmtUSD(data.value)}</span>
              </div>
            </div>
          );
        })}
      </div>
      <div style={{height:40}}/>
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
