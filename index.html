<style>

body{background:#07070F;color:#E8E8F0;font-family:"DM Sans",sans-serif;font-size:15px;line-height:1.5}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:rgba(247,147,26,0.3);border-radius:2px}
select option{background:#1A1A2E;color:#E8E8F0}

.int-row:hover{background:rgba(255,255,255,0.04)!important}
</style>

<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useRef,useCallback,useMemo}=React;

const COINS=[
  {symbol:"BTC",name:"Bitcoin",cat:"Layer 1"},{symbol:"ETH",name:"Ethereum",cat:"Layer 1"},
  {symbol:"BNB",name:"BNB",cat:"Exchange"},{symbol:"SOL",name:"Solana",cat:"Layer 1"},
  {symbol:"XRP",name:"XRP",cat:"Layer 1"},{symbol:"ADA",name:"Cardano",cat:"Layer 1"},
  {symbol:"DOGE",name:"Dogecoin",cat:"Meme"},{symbol:"AVAX",name:"Avalanche",cat:"Layer 1"},
  {symbol:"DOT",name:"Polkadot",cat:"Infraestr."},{symbol:"LINK",name:"Chainlink",cat:"DeFi"},
  {symbol:"MATIC",name:"Polygon",cat:"Layer 2"},{symbol:"UNI",name:"Uniswap",cat:"DeFi"},
  {symbol:"LTC",name:"Litecoin",cat:"Layer 1"},{symbol:"ATOM",name:"Cosmos",cat:"Infraestr."},
  {symbol:"FIL",name:"Filecoin",cat:"Infraestr."},{symbol:"NEAR",name:"NEAR",cat:"Infraestr."},
  {symbol:"ICP",name:"Internet Computer",cat:"Infraestr."},{symbol:"APT",name:"Aptos",cat:"Nueva L1"},
  {symbol:"ARB",name:"Arbitrum",cat:"Layer 2"},{symbol:"OP",name:"Optimism",cat:"Layer 2"},
  {symbol:"INJ",name:"Injective",cat:"DeFi"},{symbol:"TIA",name:"Celestia",cat:"Nueva L1"},
  {symbol:"SUI",name:"Sui",cat:"Nueva L1"},{symbol:"SEI",name:"Sei",cat:"Nueva L1"},
  {symbol:"WLD",name:"Worldcoin",cat:"AI & Datos"},{symbol:"RENDER",name:"Render",cat:"AI & Datos"},
  {symbol:"FET",name:"Fetch.ai",cat:"AI & Datos"},{symbol:"PEPE",name:"Pepe",cat:"Meme"},
  {symbol:"BONK",name:"Bonk",cat:"Meme"},{symbol:"USDT",name:"Tether",cat:"Stablecoin"},
];
const CC={"Layer 1":"#F7931A","Layer 2":"#1D6FD1","DeFi":"#00875A","Infraestr.":"#7B61FF","AI & Datos":"#00BCD4","Nueva L1":"#E91E8C","Exchange":"#FFB300","Meme":"#FF5722","Stablecoin":"#4CAF50"};

const CRYPTO_PAIRS=[
  "BTC/USDT","ETH/USDT","BNB/USDT","SOL/USDT","XRP/USDT","ADA/USDT","DOGE/USDT","AVAX/USDT",
  "DOT/USDT","LINK/USDT","MATIC/USDT","UNI/USDT","LTC/USDT","ATOM/USDT","FIL/USDT","NEAR/USDT",
  "ICP/USDT","APT/USDT","ARB/USDT","OP/USDT","INJ/USDT","TIA/USDT","SUI/USDT","SEI/USDT",
  "WLD/USDT","RENDER/USDT","FET/USDT","PEPE/USDT","BONK/USDT",
  "ETH/BTC","BNB/BTC","SOL/BTC","ADA/BTC","DOGE/BTC","LINK/BTC","DOT/BTC","LTC/BTC","ATOM/BTC",
  "BNB/ETH","SOL/ETH","MATIC/ETH","LINK/ETH","DOT/ETH",
  "BTC/ETH","SOL/BNB","ADA/BNB",
];

// Pares cruzados para la tabla de intercambio
const PARES_CRUZADOS=[
  ["ETH","BTC"],["SOL","BTC"],["BNB","BTC"],["ADA","BTC"],["XRP","BTC"],["DOGE","BTC"],["LTC","BTC"],["LINK","BTC"],["DOT","BTC"],["ATOM","BTC"],
  ["BNB","ETH"],["SOL","ETH"],["AVAX","ETH"],["LINK","ETH"],["DOT","ETH"],["MATIC","ETH"],["UNI","ETH"],["ARB","ETH"],["OP","ETH"],["ADA","ETH"],
  ["SOL","BNB"],["ADA","BNB"],
  ["BTC","ETH"],
];

const hoy=()=>{const d=new Date();return String(d.getDate()).padStart(2,"0")+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+d.getFullYear();};
const fmt=n=>{if(!n&&n!==0)return"—";if(n>=1000)return"$"+n.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});if(n>=1)return"$"+n.toFixed(2);if(n>=0.01)return"$"+n.toFixed(4);return"$"+n.toFixed(8)};
const fmtUSD=n=>"$"+(n||0).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtPct=n=>isNaN(n)?"—":(n>=0?"+":"")+n.toFixed(2)+"%";
const fmtCross=n=>{if(!n||isNaN(n))return"—";if(n>=1000)return n.toLocaleString("en-US",{minimumFractionDigits:4,maximumFractionDigits:4});if(n>=1)return n.toFixed(6);if(n>=0.0001)return n.toFixed(8);return n.toExponential(4);};

const calcPnl=(t)=>{
  if(!t.entrada||!t.salida||!t.qty)return null;
  const entrada=parseFloat(t.entrada),salida=parseFloat(t.salida),qty=parseFloat(t.qty);
  if(isNaN(entrada)||isNaN(salida)||isNaN(qty)||qty===0)return null;
  let qtyReal=qty;
  if(t.qtyMode==="usd"&&entrada>0)qtyReal=qty/entrada;
  return t.tipo==="LONG"?(salida-entrada)*qtyReal:(entrada-salida)*qtyReal;
};

const calcPnlLive=(t,prices)=>{
  if(!t.entrada||!t.qty)return null;
  const entrada=parseFloat(t.entrada),qty=parseFloat(t.qty);
  if(isNaN(entrada)||isNaN(qty)||qty===0)return null;
  const sym=t.par?.split("/")[0];
  const precioActual=prices[sym];
  if(!precioActual)return null;
  let qtyReal=qty;
  if(t.qtyMode==="usd"&&entrada>0)qtyReal=qty/entrada;
  const pnl=t.tipo==="LONG"?(precioActual-entrada)*qtyReal:(entrada-precioActual)*qtyReal;
  const pct=t.tipo==="LONG"?((precioActual-entrada)/entrada)*100:((entrada-precioActual)/entrada)*100;
  return{pnl,pct,precioActual};
};

function Sparkline({history,positive}){
  if(!history||history.length<2)return<div style={{width:64,height:28}}/>;
  const min=Math.min(...history),max=Math.max(...history),range=max-min||1,w=64,h=28;
  const pts=history.map((v,i)=>`${(i/(history.length-1))*w},${h-((v-min)/range)*(h-4)-2}`).join(" ");
  return<svg width={w} height={h} style={{display:"block"}}><polyline points={pts} fill="none" stroke={positive?"#00C853":"#FF3D00"} strokeWidth="1.5" strokeLinejoin="round" strokeLinecap="round" opacity="0.85"/></svg>;
}

function FlashPrice({price}){
  const[flash,setFlash]=useState(null),prev=useRef(price);
  useEffect(()=>{
    if(prev.current!==price&&prev.current!==undefined){
      setFlash(price>prev.current?"up":"down");
      const t=setTimeout(()=>setFlash(null),600);prev.current=price;return()=>clearTimeout(t);
    }prev.current=price;
  },[price]);
  return<span style={{fontFamily:"Space Mono,monospace",fontSize:15,fontWeight:700,color:"#FFFFFF",background:flash==="up"?"rgba(0,200,83,0.35)":flash==="down"?"rgba(255,61,0,0.35)":"transparent",borderRadius:4,padding:"1px 4px",transition:"background 0.3s"}}>{fmt(price)}</span>;
}

function EquityChart({trades}){
  const w=500,h=160,pad=40;
  let acum=0;
  const points=[{x:0,y:0,pnl:0}];
  trades.forEach((t,i)=>{const p=calcPnl(t)||0;acum+=p;points.push({x:i+1,y:acum,pnl:p,par:t.par,fecha:t.fecha});});
  if(points.length<2)return<div style={{padding:"30px 0",textAlign:"center",color:"#444460",fontSize:14}}>Agrega operaciones para ver la curva de equity</div>;
  const maxY=Math.max(...points.map(p=>p.y),10),minY=Math.min(...points.map(p=>p.y),-10),rangeY=maxY-minY||1;
  const toX=i=>(i/(points.length-1||1))*(w-pad*2)+pad;
  const toY=v=>h-pad-((v-minY)/rangeY)*(h-pad*2);
  const pts=points.map((p,i)=>`${toX(i)},${toY(p.y)}`).join(" ");
  const areaPath=`M${toX(0)},${toY(0)} `+points.map((p,i)=>`L${toX(i)},${toY(p.y)}`).join(" ")+` L${toX(points.length-1)},${h-pad} L${toX(0)},${h-pad} Z`;
  const zero=toY(0),finalColor=acum>=0?"#00C853":"#FF3D00";
  return(
    <div>
      <svg width="100%" viewBox={`0 0 ${w} ${h}`} style={{overflow:"visible"}}>
        <defs><linearGradient id="eqGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={finalColor} stopOpacity="0.3"/><stop offset="100%" stopColor={finalColor} stopOpacity="0.02"/></linearGradient></defs>
        {[0,0.25,0.5,0.75,1].map(f=>{const y=pad+(h-pad*2)*f,val=maxY-(rangeY*f);return<g key={f}><line x1={pad} y1={y} x2={w-pad} y2={y} stroke="rgba(255,255,255,0.04)" strokeWidth="1"/><text x={pad-6} y={y+4} textAnchor="end" fontSize="9" fill="#888899">${val.toFixed(0)}</text></g>;})}
        <line x1={pad} y1={zero} x2={w-pad} y2={zero} stroke="rgba(255,255,255,0.2)" strokeWidth="1" strokeDasharray="4,4"/>
        <path d={areaPath} fill="url(#eqGrad)"/>
        <polyline points={pts} fill="none" stroke={finalColor} strokeWidth="2" strokeLinejoin="round" strokeLinecap="round"/>
        {points.slice(1).map((p,i)=><circle key={i} cx={toX(i+1)} cy={toY(p.y)} r="3" fill={p.pnl>=0?"#00C853":"#FF3D00"} stroke="#07070F" strokeWidth="1.5"/>)}
        {points.slice(1).map((p,i)=><text key={i} x={toX(i+1)} y={h-4} textAnchor="middle" fontSize="8" fill="#888899">{p.par?.split("/")[0]}</text>)}
      </svg>
      <div style={{display:"flex",justifyContent:"space-between",marginTop:4,fontSize:14,color:"#CCCCDD"}}>
        <span>Inicio</span>
        <span style={{color:finalColor,fontWeight:700}}>{(acum>=0?"+":"")+"$"+acum.toFixed(2)}</span>
      </div>
    </div>
  );
}

function PnlBars({trades}){
  const data=trades.map(t=>({pnl:calcPnl(t)||0,par:t.par}));
  const maxAbs=Math.max(...data.map(d=>Math.abs(d.pnl)),1);
  return(
    <div style={{display:"flex",flexDirection:"column",gap:6}}>
      {data.map((d,i)=>{
        const pct=(Math.abs(d.pnl)/maxAbs)*100,isPos=d.pnl>=0;
        return(
          <div key={i} style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:70,fontSize:12,color:"#DDDDEE",textAlign:"right",flexShrink:0,fontWeight:600}}>{d.par?.split("/")[0]}</div>
            <div style={{flex:1,position:"relative",height:20,background:"rgba(255,255,255,0.06)",borderRadius:4,overflow:"hidden"}}>
              <div style={{position:"absolute",top:0,left:0,height:"100%",width:`${pct}%`,background:isPos?"linear-gradient(90deg,#00875A,#00C853)":"linear-gradient(90deg,#C62828,#FF3D00)",borderRadius:4}}/>
              <span style={{position:"absolute",right:8,top:"50%",transform:"translateY(-50%)",fontSize:10,fontWeight:700,color:isPos?"#00FF6A":"#FF6B6B",fontFamily:"Space Mono,monospace"}}>{(isPos?"+":"")+"$"+d.pnl.toFixed(2)}</span>
            </div>
          </div>
        );
      })}
    </div>
  );
}

function WinRateDonut({wins,losses}){
  const total=wins+losses||1,pct=wins/total,r=45,cx=60,cy=60,circ=2*Math.PI*r,dash=pct*circ;
  return(
    <div style={{display:"flex",alignItems:"center",gap:20}}>
      <svg width="120" height="120" viewBox="0 0 120 120">
        <circle cx={cx} cy={cy} r={r} fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth="14"/>
        <circle cx={cx} cy={cy} r={r} fill="none" stroke="#FF3D00" strokeWidth="14" strokeDasharray={`${(1-pct)*circ} ${dash}`} strokeDashoffset={circ*0.25} strokeLinecap="round"/>
        <circle cx={cx} cy={cy} r={r} fill="none" stroke="#00C853" strokeWidth="14" strokeDasharray={`${dash} ${circ-dash}`} strokeDashoffset={circ*0.25} strokeLinecap="round"/>
        <text x={cx} y={cy-6} textAnchor="middle" fontSize="18" fontWeight="800" fill="#E8E8F0">{(pct*100).toFixed(0)}%</text>
        <text x={cx} y={cy+12} textAnchor="middle" fontSize="10" fill="#AAAACC">Win Rate</text>
      </svg>
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}><div style={{width:10,height:10,borderRadius:"50%",background:"#00C853"}}/><span style={{fontSize:14,color:"#E8E8F0"}}><b>{wins}</b> Ganadas</span></div>
        <div style={{display:"flex",alignItems:"center",gap:8}}><div style={{width:10,height:10,borderRadius:"50%",background:"#FF3D00"}}/><span style={{fontSize:14,color:"#E8E8F0"}}><b>{losses}</b> Perdidas</span></div>
        <div style={{fontSize:14,color:"#DDDDEE"}}>{total} operaciones</div>
      </div>
    </div>
  );
}

// ── DCA PANEL ─────────────────────────────────────────────────
function DCAPanel({prices}){
  const[par,setPar]=useState(()=>{try{return localStorage.getItem("dca_par")||"BTC";}catch(e){return"BTC";}});
  const[capital,setCapital]=useState(()=>{try{return parseFloat(localStorage.getItem("dca_capital"))||1000;}catch(e){return 1000;}});
  const[precioActual,setPrecioActual]=useState(()=>{try{return localStorage.getItem("dca_precio")||"";}catch(e){return"";}});
  const[niveles,setNiveles]=useState(()=>{try{const s=localStorage.getItem("dca_niveles");if(s)return JSON.parse(s);}catch(e){}return[{pct:-5,monto:200},{pct:-10,monto:350},{pct:-15,monto:500},{pct:-20,monto:750},{pct:-25,monto:1000}];});
  const[comision,setComision]=useState(()=>{try{return parseFloat(localStorage.getItem("dca_comision"))||0.1;}catch(e){return 0.1;}});
  const[intercambios,setIntercambios]=useState(()=>{try{const s=localStorage.getItem("dca_intercambios");if(s)return JSON.parse(s);}catch(e){}return[{id:1,par:"BTC/USDT",entrada:0,cantidadCrypto:0,estado:"abierto",fecha:""}];});
  const[saved,setSaved]=useState(false);
  const precioBase=precioActual?parseFloat(precioActual):(prices[par]||0);
  const guardar=()=>{try{localStorage.setItem("dca_par",par);localStorage.setItem("dca_capital",String(capital));localStorage.setItem("dca_precio",precioActual);localStorage.setItem("dca_niveles",JSON.stringify(niveles));localStorage.setItem("dca_comision",String(comision));localStorage.setItem("dca_intercambios",JSON.stringify(intercambios));setSaved(true);setTimeout(()=>setSaved(false),2000);}catch(e){}};
  const rows=niveles.map(n=>{const precio=precioBase*(1+n.pct/100),qty=precio>0?n.monto/precio:0,com=n.monto*(comision/100)*2;return{...n,precio,qty,com,beOk:precio<precioBase};});
  const totalInvertido=rows.reduce((s,r)=>s+r.monto,0);
  const totalQty=rows.reduce((s,r)=>s+r.qty,0);
  const precioPromedio=totalQty>0?totalInvertido/totalQty:0;
  const valorActual=totalQty*(precioBase||0);
  const pnlDca=valorActual-totalInvertido;
  const DCAChart=()=>{
    const precioActualLive=prices[par]||precioBase||1;
    const precios=rows.map(r=>r.precio);
    const allPrecios=[precioActualLive,...precios];
    const minP=Math.min(...allPrecios)*0.97,maxP=Math.max(...allPrecios)*1.01;
    const range=maxP-minP||1;
    const w=400,h=180,padL=60,padR=20,padT=20,padB=20;
    const toY=p=>padT+(1-(p-minP)/range)*(h-padT-padB);
    const yActual=toY(precioActualLive);
    return(
      <svg width="100%" viewBox={`0 0 ${w} ${h}`} style={{overflow:"visible"}}>
        <line x1={padL} y1={yActual} x2={w-padR} y2={yActual} stroke="#F7931A" strokeWidth="1.5" strokeDasharray="6,3"/>
        <text x={padL-4} y={yActual+4} textAnchor="end" fontSize="9" fill="#F7931A" fontWeight="700">{fmt(precioActualLive)}</text>
        <text x={w-padR} y={yActual-4} textAnchor="end" fontSize="9" fill="#F7931A">Precio actual</text>
        {rows.map((r,i)=>{const y=toY(r.precio);const isBelow=r.precio<precioActualLive;const color=isBelow?"#00C853":"#FF6B6B";return(<g key={i}><line x1={padL} y1={y} x2={w-padR} y2={y} stroke={color} strokeWidth="1" strokeDasharray="3,3" opacity="0.7"/><circle cx={padL+20+i*((w-padL-padR-40)/Math.max(rows.length-1,1))} cy={y} r="5" fill={color} stroke="#07070F" strokeWidth="1.5"/><text x={padL-4} y={y+4} textAnchor="end" fontSize="8" fill={color}>{fmt(r.precio)}</text><text x={padL+24+i*((w-padL-padR-40)/Math.max(rows.length-1,1))} y={y-7} textAnchor="middle" fontSize="8" fill={color}>#{i+1} ${r.monto}</text></g>);})}
      </svg>
    );
  };
  const addIntercambio=()=>{const newId=Date.now();setIntercambios(prev=>[...prev,{id:newId,par:"BTC/USDT",entrada:0,cantidadCrypto:0,estado:"abierto",fecha:hoy()}]);};
  const removeIntercambio=(id)=>setIntercambios(prev=>prev.filter(x=>x.id!==id));
  const updateIntercambio=(id,field,val)=>setIntercambios(prev=>prev.map(x=>x.id===id?{...x,[field]:val}:x));
  return(
    <div style={{animation:"fadeIn 0.3s ease"}}>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(160px,1fr))",gap:14,padding:"24px 0 16px"}}>
        <div style={cardStyle("#F7931A")}><div style={labelStyle}>Moneda Base</div><select value={par} onChange={e=>setPar(e.target.value)} style={{width:"100%",background:"rgba(247,147,26,0.1)",border:"1px solid rgba(247,147,26,0.3)",borderRadius:6,padding:"8px 10px",color:"#F7931A",fontSize:14,fontWeight:700,outline:"none",marginTop:4}}>{COINS.filter(c=>c.symbol!=="USDT").map(c=><option key={c.symbol} value={c.symbol}>{c.symbol}</option>)}</select></div>
        <div style={cardStyle("#1D6FD1")}><div style={labelStyle}>Precio Base (USDT)</div><input type="number" value={precioActual||""} placeholder={fmt(precioBase)} onChange={e=>setPrecioActual(e.target.value)} style={{width:"100%",background:"rgba(29,111,209,0.1)",border:"1px solid rgba(29,111,209,0.3)",borderRadius:6,padding:"8px 10px",color:"#FFFFFF",fontSize:14,fontWeight:700,outline:"none",marginTop:4}}/><div style={{fontSize:13,color:"#90CAF9",marginTop:4,fontWeight:600}}>Binance: {fmt(prices[par]||0)}</div></div>
        <div style={cardStyle("#00875A")}><div style={labelStyle}>Capital Total DCA</div><input type="number" value={capital} onChange={e=>setCapital(parseFloat(e.target.value)||0)} style={{width:"100%",background:"rgba(0,135,90,0.1)",border:"1px solid rgba(0,135,90,0.3)",borderRadius:6,padding:"8px 10px",color:"#00FF6A",fontSize:14,fontWeight:700,outline:"none",marginTop:4}}/></div>
        <div style={cardStyle("#7B61FF")}><div style={labelStyle}>Comisión %</div><input type="number" value={comision} step="0.01" onChange={e=>setComision(parseFloat(e.target.value)||0)} style={{width:"100%",background:"rgba(123,97,255,0.1)",border:"1px solid rgba(123,97,255,0.3)",borderRadius:6,padding:"8px 10px",color:"#D0BBFF",fontSize:14,fontWeight:700,outline:"none",marginTop:4}}/></div>
      </div>
      <div style={{display:"flex",justifyContent:"flex-end",marginBottom:16,gap:10,alignItems:"center"}}>
        {saved&&<span style={{fontSize:13,color:"#00C853",fontWeight:700}}>✅ ¡Guardado!</span>}
        <button onClick={guardar} style={{padding:"10px 24px",borderRadius:10,border:"none",cursor:"pointer",fontSize:14,fontWeight:700,background:"linear-gradient(135deg,#F7931A,#E65100)",color:"#000"}}>💾 Guardar DCA</button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))",gap:12,marginBottom:20}}>
        {[{l:"Total Invertido",v:fmtUSD(totalInvertido),c:"#F7931A"},{l:"Cantidad Total",v:totalQty.toFixed(6)+" "+par,c:"#FFFFFF"},{l:"Precio Promedio",v:fmt(precioPromedio),c:"#90CAF9"},{l:"Valor Actual",v:fmtUSD(valorActual),c:"#00C853"},{l:"P&L DCA",v:(pnlDca>=0?"+":"")+fmtUSD(pnlDca),c:pnlDca>=0?"#00FF6A":"#FF6B6B"}].map(({l,v,c})=>(
          <div key={l} style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:10,padding:"12px 14px"}}><div style={{fontSize:12,color:"#DDDDEE",textTransform:"uppercase",letterSpacing:"0.6px",marginBottom:6}}>{l}</div><div style={{fontSize:15,fontWeight:800,color:c,fontFamily:"Space Mono,monospace"}}>{v}</div></div>
        ))}
      </div>
      <div style={{...cardStyle("#F7931A"),marginBottom:20}}><div style={{fontSize:14,fontWeight:800,color:"#FFFFFF",marginBottom:12}}>📊 Niveles DCA — {par}/USDT</div><DCAChart/><div style={{fontSize:12,color:"#AAAACC",marginTop:8,textAlign:"center"}}>🟢 Niveles por debajo del precio actual · 🔴 Niveles por encima</div></div>

        <div style={{display:"grid",gridTemplateColumns:"60px 90px 100px 100px 80px 90px 90px",padding:"10px 20px",borderBottom:"1px solid rgba(255,255,255,0.06)",fontSize:12,color:"#DDDDEE",textTransform:"uppercase",letterSpacing:"0.6px"}}>{["Nivel","Caída %","Precio","Monto $","Cantidad","Comisión","Estado"].map(h=><div key={h} style={{textAlign:"right",...(h==="Nivel"?{textAlign:"left"}:{})}}>{h}</div>)}</div>
        {rows.map((r,i)=>(<div key={i} style={{display:"grid",gridTemplateColumns:"60px 90px 100px 100px 80px 90px 90px",padding:"11px 20px",borderBottom:"1px solid rgba(255,255,255,0.04)",background:i%2===0?"transparent":"rgba(255,255,255,0.02)",alignItems:"center"}}><div style={{fontSize:13,fontWeight:700,color:"#F7931A"}}>#{i+1}</div><div style={{textAlign:"right"}}><input type="number" value={r.pct} onChange={e=>{const n=[...niveles];n[i]={...n[i],pct:parseFloat(e.target.value)||0};setNiveles(n);}} style={{width:65,background:"rgba(255,61,0,0.1)",border:"1px solid rgba(255,61,0,0.3)",borderRadius:6,padding:"3px 6px",color:"#FF8A80",fontSize:12,textAlign:"right",outline:"none",fontFamily:"Space Mono,monospace"}}/><span style={{color:"#FF8A80",fontSize:11}}>%</span></div><div style={{textAlign:"right",fontFamily:"Space Mono,monospace",fontSize:12,color:"#FFFFFF"}}>{fmt(r.precio)}</div><div style={{textAlign:"right"}}><input type="number" value={r.monto} onChange={e=>{const n=[...niveles];n[i]={...n[i],monto:parseFloat(e.target.value)||0};setNiveles(n);}} style={{width:85,background:"rgba(0,135,90,0.1)",border:"1px solid rgba(0,135,90,0.3)",borderRadius:6,padding:"3px 6px",color:"#00FF6A",fontSize:12,textAlign:"right",outline:"none",fontFamily:"Space Mono,monospace"}}/></div><div style={{textAlign:"right",fontFamily:"Space Mono,monospace",fontSize:11,color:"#CCCCDD"}}>{r.qty.toFixed(4)}</div><div style={{textAlign:"right",fontFamily:"Space Mono,monospace",fontSize:11,color:"#D0BBFF"}}>{fmtUSD(r.com)}</div><div style={{textAlign:"right"}}><span style={{fontSize:11,fontWeight:700,padding:"3px 8px",borderRadius:20,background:r.beOk?"rgba(0,200,83,0.2)":"rgba(255,61,0,0.2)",color:r.beOk?"#00FF6A":"#FF6B6B"}}>{r.beOk?"✅ OK":"⏳ Espera"}</span></div></div>))}
        <div style={{display:"grid",gridTemplateColumns:"60px 90px 100px 100px 80px 90px 90px",padding:"12px 20px",borderTop:"1px solid rgba(247,147,26,0.3)",background:"rgba(247,147,26,0.06)",alignItems:"center"}}><div style={{fontSize:12,fontWeight:800,color:"#F7931A"}}>TOTAL</div><div/><div/><div style={{textAlign:"right",fontFamily:"Space Mono,monospace",fontSize:13,fontWeight:800,color:"#F7931A"}}>{fmtUSD(totalInvertido)}</div><div style={{textAlign:"right",fontFamily:"Space Mono,monospace",fontSize:11,color:"#CCCCDD"}}>{totalQty.toFixed(4)}</div><div style={{textAlign:"right",fontFamily:"Space Mono,monospace",fontSize:11,color:"#D0BBFF"}}>{fmtUSD(rows.reduce((s,r)=>s+r.com,0))}</div><div/></div>
      </div>
      <div style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:14,overflow:"hidden",marginBottom:24}}>
        <div style={{padding:"14px 20px",borderBottom:"1px solid rgba(255,255,255,0.07)",display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontSize:15,fontWeight:700,color:"#FFFFFF"}}>🔄 Intercambios entre Monedas</span><button onClick={addIntercambio} style={{padding:"7px 16px",borderRadius:8,border:"none",cursor:"pointer",fontSize:12,fontWeight:700,background:"linear-gradient(135deg,#F7931A,#E65100)",color:"#000"}}>+ Agregar</button></div>
        {intercambios.length===0&&(<div style={{padding:"30px",textAlign:"center",color:"#444460",fontSize:14}}>Haz clic en "+ Agregar" para registrar un intercambio</div>)}
        {intercambios.map((x)=>{const sym=x.par?.split("/")[0];const precioLive=prices[sym]||0;const valorActualX=parseFloat(x.cantidadCrypto||0)*precioLive;const invertidoX=parseFloat(x.entrada||0)*parseFloat(x.cantidadCrypto||0);const pnlX=valorActualX-invertidoX;const pctX=invertidoX>0?(pnlX/invertidoX)*100:0;const isOpen=x.estado==="abierto";return(<div key={x.id} style={{padding:"14px 20px",borderBottom:"1px solid rgba(255,255,255,0.04)",background:"rgba(255,255,255,0.01)"}}><div style={{display:"grid",gridTemplateColumns:"130px 100px 110px 110px 90px 1fr 40px",gap:10,alignItems:"center",flexWrap:"wrap"}}><div><div style={{fontSize:11,color:"#AAAACC",marginBottom:3}}>Par</div><select value={x.par} onChange={e=>updateIntercambio(x.id,"par",e.target.value)} style={{width:"100%",background:"rgba(247,147,26,0.1)",border:"1px solid rgba(247,147,26,0.3)",borderRadius:6,padding:"5px 8px",color:"#F7931A",fontSize:12,fontWeight:700,outline:"none"}}>{CRYPTO_PAIRS.map(p=><option key={p} value={p}>{p}</option>)}</select></div><div><div style={{fontSize:11,color:"#AAAACC",marginBottom:3}}>Precio entrada</div><input type="number" value={x.entrada||""} placeholder="0.00" onChange={e=>updateIntercambio(x.id,"entrada",e.target.value)} style={{width:"100%",background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:6,padding:"5px 8px",color:"#FFFFFF",fontSize:12,outline:"none",fontFamily:"Space Mono,monospace"}}/></div><div><div style={{fontSize:11,color:"#AAAACC",marginBottom:3}}>Cantidad crypto</div><input type="number" value={x.cantidadCrypto||""} placeholder="0.00" onChange={e=>updateIntercambio(x.id,"cantidadCrypto",e.target.value)} style={{width:"100%",background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:6,padding:"5px 8px",color:"#FFFFFF",fontSize:12,outline:"none",fontFamily:"Space Mono,monospace"}}/></div><div><div style={{fontSize:11,color:"#AAAACC",marginBottom:3}}>Fecha</div><div style={{display:"flex",gap:4}}><input type="text" value={x.fecha||""} placeholder="DD-MM-YYYY" onChange={e=>updateIntercambio(x.id,"fecha",e.target.value)} style={{flex:1,background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:6,padding:"5px 8px",color:"#FFFFFF",fontSize:11,outline:"none"}}/><button onClick={()=>updateIntercambio(x.id,"fecha",hoy())} style={{padding:"5px 6px",borderRadius:6,border:"none",cursor:"pointer",background:"rgba(247,147,26,0.2)",color:"#F7931A",fontSize:11}}>📅</button></div></div><div><div style={{fontSize:11,color:"#AAAACC",marginBottom:3}}>Estado</div><select value={x.estado} onChange={e=>updateIntercambio(x.id,"estado",e.target.value)} style={{width:"100%",background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:6,padding:"5px 8px",color:isOpen?"#00FF6A":"#AAAACC",fontSize:12,outline:"none",fontWeight:700}}><option value="abierto">🟢 Abierto</option><option value="cerrado">⚪ Cerrado</option></select></div><div style={{background:pnlX>=0?"rgba(0,200,83,0.1)":"rgba(255,61,0,0.1)",borderRadius:8,padding:"8px 12px",border:`1px solid ${pnlX>=0?"rgba(0,200,83,0.2)":"rgba(255,61,0,0.2)"}`}}><div style={{fontSize:10,color:"#AAAACC",marginBottom:2}}>P&L en vivo</div><div style={{fontSize:13,fontWeight:800,color:pnlX>=0?"#00FF6A":"#FF6B6B",fontFamily:"Space Mono,monospace"}}>{(pnlX>=0?"+":"")+fmtUSD(pnlX)}</div><div style={{fontSize:11,color:pnlX>=0?"#00FF6A":"#FF6B6B"}}>{(pctX>=0?"+":"")+pctX.toFixed(2)}%</div><div style={{fontSize:10,color:"#888899",marginTop:1}}>Precio live: {fmt(precioLive)}</div></div><button onClick={()=>removeIntercambio(x.id)} style={{padding:"6px 8px",borderRadius:6,border:"none",cursor:"pointer",background:"rgba(255,61,0,0.15)",color:"#FF6B6B",fontSize:14,fontWeight:700,alignSelf:"flex-end"}}>🗑️</button></div></div>);})}
      </div>
      <div style={{height:40}}/>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════
// NUEVA PESTAÑA: INTERCAMBIO DE PARES
// ══════════════════════════════════════════════════════════════
function Intercambio({prices}){
  const monedas=COINS.filter(c=>c.symbol!=="USDT").map(c=>c.symbol);
  const gp=sym=>sym==="USDT"?1:(prices[sym]||0);

  // ── Calculadora ──
  const[desde,setDesde]=useState("ETH");
  const[hacia,setHacia]=useState("BTC");
  const[monto,setMonto]=useState("1");
  const[historial,setHistorial]=useState([]);
  const[busqueda,setBusqueda]=useState("");

  const precioDesde=gp(desde);
  const precioHacia=gp(hacia);
  const tasaCruzada=precioHacia>0?precioDesde/precioHacia:0;
  const resultado=parseFloat(monto||0)*tasaCruzada;

  const guardarConversion=()=>{
    if(!monto||parseFloat(monto)<=0||!tasaCruzada)return;
    setHistorial(h=>[{
      id:Date.now(),desde,hacia,
      monto:parseFloat(monto),resultado,tasa:tasaCruzada,
      hora:new Date().toLocaleTimeString("es-ES",{hour:"2-digit",minute:"2-digit",second:"2-digit"}),
      fecha:new Date().toLocaleDateString("es-ES"),
    },...h].slice(0,20));
  };

  const pares=PARES_CRUZADOS.filter(([a,b])=>
    a.toLowerCase().includes(busqueda.toLowerCase())||
    b.toLowerCase().includes(busqueda.toLowerCase())
  );

  const inpStyle={
    width:"100%",background:"#15152A",border:"2px solid #2A2A44",
    borderRadius:10,padding:"14px 16px",color:"#E8E8F0",
    fontSize:18,fontFamily:"Space Mono,monospace",fontWeight:700,outline:"none",
  };
  const selStyle={
    width:"100%",background:"#15152A",border:"2px solid #2A2A44",
    borderRadius:10,padding:"14px 16px",color:"#E8E8F0",
    fontSize:16,fontWeight:700,outline:"none",cursor:"pointer",
  };
  const secTitle={fontSize:20,fontWeight:800,color:"#FFFFFF",marginBottom:6};
  const secSub={fontSize:14,color:"#888899",marginBottom:24};

  return(
    <div style={{animation:"fadeIn 0.3s ease",paddingTop:24}}>

      {/* ── CALCULADORA ── */}
      <div style={{background:"#0F0F1E",border:"2px solid #2A2A44",borderRadius:16,padding:"28px 28px 24px",marginBottom:28}}>
        <div style={secTitle}>Calculadora de Conversión</div>
        <div style={secSub}>Convierte entre cualquier par usando precios de Binance en tiempo real</div>

        <div style={{display:"grid",gridTemplateColumns:"1fr 56px 1fr",gap:12,alignItems:"end",marginBottom:20}}>
          {/* Desde */}
          <div>
            <div style={{fontSize:15,fontWeight:700,color:"#CCCCDD",marginBottom:8}}>Moneda de origen</div>
            <select style={selStyle} value={desde} onChange={e=>setDesde(e.target.value)}>
              {monedas.map(m=><option key={m} value={m}>{m} — {COINS.find(c=>c.symbol===m)?.name}</option>)}
            </select>
            <input style={{...inpStyle,marginTop:10}} type="number" min="0"
              placeholder="Ingresa cantidad..." value={monto}
              onChange={e=>setMonto(e.target.value)}/>
            <div style={{fontSize:13,color:"#666680",marginTop:6,fontFamily:"Space Mono,monospace"}}>
              Precio USD: {fmt(precioDesde)}
            </div>
          </div>

          {/* Botón intercambiar */}
          <div style={{display:"flex",justifyContent:"center",alignItems:"center",paddingBottom:50}}>
            <button onClick={()=>{setDesde(hacia);setHacia(desde);}}
              style={{width:48,height:48,borderRadius:"50%",border:"2px solid #3A3A58",
                background:"#1C1C30",color:"#AAAACC",fontSize:22,cursor:"pointer",
                display:"flex",alignItems:"center",justifyContent:"center"}}>
              ⇄
            </button>
          </div>

          {/* Hacia */}
          <div>
            <div style={{fontSize:15,fontWeight:700,color:"#CCCCDD",marginBottom:8}}>Moneda destino</div>
            <select style={selStyle} value={hacia} onChange={e=>setHacia(e.target.value)}>
              {monedas.map(m=><option key={m} value={m}>{m} — {COINS.find(c=>c.symbol===m)?.name}</option>)}
            </select>
            <div style={{...inpStyle,marginTop:10,background:"#0A0A18",color:"#C0C0D8",userSelect:"none",cursor:"default"}}>
              {resultado>0?fmtCross(resultado):"—"}
            </div>
            <div style={{fontSize:13,color:"#666680",marginTop:6,fontFamily:"Space Mono,monospace"}}>
              Precio USD: {fmt(precioHacia)}
            </div>
          </div>
        </div>

        {/* Tasa cruzada */}
        {tasaCruzada>0&&(
          <div style={{background:"#0A0A18",border:"1px solid #2A2A44",borderRadius:12,
            padding:"16px 20px",marginBottom:20,display:"flex",flexWrap:"wrap",
            gap:16,alignItems:"center",justifyContent:"space-between"}}>
            <div>
              <div style={{fontSize:13,color:"#888899",marginBottom:4}}>Tasa cruzada actual</div>
              <div style={{fontSize:22,fontWeight:800,color:"#E8E8F0",fontFamily:"Space Mono,monospace"}}>
                1 {desde} = {fmtCross(tasaCruzada)} {hacia}
              </div>
            </div>
            <div style={{textAlign:"right"}}>
              <div style={{fontSize:13,color:"#888899",marginBottom:4}}>Tasa inversa</div>
              <div style={{fontSize:17,fontWeight:700,color:"#AAAACC",fontFamily:"Space Mono,monospace"}}>
                1 {hacia} = {fmtCross(1/tasaCruzada)} {desde}
              </div>
            </div>
          </div>
        )}

        <button onClick={guardarConversion}
          style={{padding:"13px 30px",borderRadius:10,border:"2px solid #3A3A58",
            background:"#1C1C30",color:"#C8C8E0",fontSize:16,fontWeight:800,
            cursor:"pointer",letterSpacing:"0.3px"}}>
          💾 Guardar en historial
        </button>
      </div>

      {/* ── TABLA DE PARES CRUZADOS ── */}
      <div style={{background:"#0F0F1E",border:"2px solid #2A2A44",borderRadius:16,padding:"28px 28px 20px",marginBottom:28}}>
        <div style={secTitle}>Tabla de Pares Cruzados</div>
        <div style={secSub}>Tasas calculadas en tiempo real desde los precios USDT de Binance</div>

        <input style={{...inpStyle,marginBottom:20,fontSize:15,fontWeight:500}}
          placeholder="Buscar par — escribe ETH, BTC, SOL..."
          value={busqueda} onChange={e=>setBusqueda(e.target.value)}/>

        <div style={{overflowX:"auto"}}>
          <div style={{display:"grid",gridTemplateColumns:"56px 1fr 1fr 1fr 1fr",
            padding:"12px 16px",borderBottom:"2px solid #2A2A44",
            fontSize:13,fontWeight:700,color:"#888899",textTransform:"uppercase",
            letterSpacing:"0.8px",minWidth:560}}>
            {["#","Par","Precio A (USD)","Precio B (USD)","Tasa A → B"].map((h,i)=>
              <div key={h} style={{textAlign:i<2?"left":"right"}}>{h}</div>)}
          </div>

          {pares.map(([a,b],i)=>{
            const pA=gp(a),pB=gp(b),tasa=pB>0?pA/pB:0;
            return(
              <div key={`${a}-${b}`} className="int-row" style={{
                display:"grid",gridTemplateColumns:"56px 1fr 1fr 1fr 1fr",
                padding:"15px 16px",borderBottom:"1px solid #1A1A2E",
                alignItems:"center",minWidth:560,transition:"background 0.15s",
              }}>
                <div style={{fontSize:14,color:"#555570",fontFamily:"Space Mono,monospace"}}>
                  {(i+1).toString().padStart(2,"0")}
                </div>
                <div>
                  <span style={{fontSize:19,fontWeight:800,color:"#E8E8F0"}}>{a}</span>
                  <span style={{fontSize:18,color:"#555570",margin:"0 6px"}}>/</span>
                  <span style={{fontSize:19,fontWeight:800,color:"#BBBBCC"}}>{b}</span>
                </div>
                <div style={{textAlign:"right",fontFamily:"Space Mono,monospace",fontSize:14,fontWeight:700,color:"#CCCCDD"}}>{fmt(pA)}</div>
                <div style={{textAlign:"right",fontFamily:"Space Mono,monospace",fontSize:14,fontWeight:700,color:"#CCCCDD"}}>{fmt(pB)}</div>
                <div style={{textAlign:"right",fontFamily:"Space Mono,monospace",fontSize:16,fontWeight:800,color:"#E8E8F0"}}>
                  {tasa>0?fmtCross(tasa):"Sin datos"}
                </div>
              </div>
            );
          })}

          {pares.length===0&&(
            <div style={{padding:"40px 16px",textAlign:"center",color:"#555570",fontSize:16}}>
              No se encontraron pares con "{busqueda}"
            </div>
          )}
        </div>
      </div>

      {/* ── HISTORIAL ── */}
      <div style={{background:"#0F0F1E",border:"2px solid #2A2A44",borderRadius:16,padding:"28px 28px 20px",marginBottom:28}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6,flexWrap:"wrap",gap:10}}>
          <div>
            <div style={secTitle}>Historial de Conversiones</div>
            <div style={secSub}>{historial.length} conversión{historial.length!==1?"es":""} guardada{historial.length!==1?"s":""}</div>
          </div>
          {historial.length>0&&(
            <button onClick={()=>setHistorial([])}
              style={{padding:"10px 20px",borderRadius:8,border:"2px solid #3A3A58",
                background:"transparent",color:"#888899",fontSize:14,fontWeight:700,cursor:"pointer"}}>
              Limpiar todo
            </button>
          )}
        </div>

        {historial.length===0?(
          <div style={{padding:"40px 0",textAlign:"center"}}>
            <div style={{fontSize:42,marginBottom:12}}>🔄</div>
            <div style={{fontSize:18,color:"#555570",fontWeight:700}}>Aún no hay conversiones guardadas</div>
            <div style={{fontSize:14,color:"#444460",marginTop:6}}>Usa la calculadora de arriba y pulsa "Guardar en historial"</div>
          </div>
        ):(
          <div style={{overflowX:"auto",marginTop:8}}>
            <div style={{display:"grid",gridTemplateColumns:"130px 1fr 1fr 1fr 110px",
              padding:"12px 16px",borderBottom:"2px solid #2A2A44",
              fontSize:12,fontWeight:700,color:"#777799",textTransform:"uppercase",
              letterSpacing:"0.8px",minWidth:640}}>
              {["Fecha / Hora","Convertí","Obtuve","Tasa usada","Par"].map(h=><div key={h}>{h}</div>)}
            </div>
            {historial.map(h=>(
              <div key={h.id} style={{display:"grid",gridTemplateColumns:"130px 1fr 1fr 1fr 110px",
                padding:"15px 16px",borderBottom:"1px solid #1A1A2E",alignItems:"center",minWidth:640}}>
                <div>
                  <div style={{fontSize:14,color:"#CCCCDD",fontFamily:"Space Mono,monospace"}}>{h.hora}</div>
                  <div style={{fontSize:12,color:"#555570",marginTop:2}}>{h.fecha}</div>
                </div>
                <div>
                  <span style={{fontSize:18,fontWeight:800,color:"#E8E8F0",fontFamily:"Space Mono,monospace"}}>
                    {h.monto.toLocaleString("en-US",{maximumFractionDigits:8})}
                  </span>
                  <span style={{fontSize:14,color:"#888899",marginLeft:6}}>{h.desde}</span>
                </div>
                <div>
                  <span style={{fontSize:18,fontWeight:800,color:"#C8C8E0",fontFamily:"Space Mono,monospace"}}>
                    {fmtCross(h.resultado)}
                  </span>
                  <span style={{fontSize:14,color:"#888899",marginLeft:6}}>{h.hacia}</span>
                </div>
                <div style={{fontFamily:"Space Mono,monospace",fontSize:13,color:"#777799"}}>
                  1 {h.desde} = {fmtCross(h.tasa)} {h.hacia}
                </div>
                <div>
                  <span style={{fontSize:14,fontWeight:800,padding:"5px 12px",borderRadius:8,
                    background:"#1A1A30",border:"1px solid #2A2A44",color:"#AAAACC"}}>
                    {h.desde}/{h.hacia}
                  </span>
                </div>
              </div>
            ))}
          </div>
        )}
      </div>

      <div style={{height:40}}/>
    </div>
  );
}

const cardStyle=(c="#F7931A")=>({background:"rgba(255,255,255,0.03)",border:`1px solid rgba(255,255,255,0.08)`,borderTop:`3px solid ${c}`,borderRadius:12,padding:"16px 18px"});
const labelStyle={fontSize:13,color:"#DDDDEE",textTransform:"uppercase",letterSpacing:"0.8px",fontWeight:600};

// ══════════════════════════════════════════════════════════════
// MAIN APP
// ══════════════════════════════════════════════════════════════
function App(){
  const[prices,setPrices]=useState({});
  const[changes,setChanges]=useState({});
  const[history,setHistory]=useState({});
  const[status,setStatus]=useState("connecting");
  const[reconnects,setReconnects]=useState(0);
  const[hiddenCoins,setHiddenCoins]=useState(()=>{try{const s=localStorage.getItem("cpro_hidden");if(s)return JSON.parse(s);}catch(e){}return[];});
  const[showCoinManager,setShowCoinManager]=useState(false);
  const[quantities,setQuantities]=useState(()=>{try{const s=localStorage.getItem("cpro_qty");if(s)return JSON.parse(s);}catch(e){}const q={};COINS.forEach(c=>q[c.symbol]=0);return q;});
  const[editMode,setEditMode]=useState(false);
  const[tab,setTab]=useState("dashboard");
  const[grafTab,setGrafTab]=useState("equity");
  const[sortBy,setSortBy]=useState("value");
  const[filterCat,setFilterCat]=useState("Todas");
  const[trades,setTrades]=useState(()=>{try{const s=localStorage.getItem("cpro_trades");if(s)return JSON.parse(s);}catch(e){}return[];});
  const[time,setTime]=useState(new Date().toLocaleTimeString("es-ES"));

  useEffect(()=>{try{localStorage.setItem("cpro_qty",JSON.stringify(quantities));}catch(e){}},[quantities]);
  useEffect(()=>{try{localStorage.setItem("cpro_trades",JSON.stringify(trades));}catch(e){}},[trades]);
  useEffect(()=>{try{localStorage.setItem("cpro_hidden",JSON.stringify(hiddenCoins));}catch(e){}},[hiddenCoins]);
  const wsRef=useRef(null),mountRef=useRef(true);
  useEffect(()=>{const t=setInterval(()=>setTime(new Date().toLocaleTimeString("es-ES")),1000);return()=>clearInterval(t);},[]);

  const connect=useCallback(()=>{
    if(!mountRef.current)return;setStatus("connecting");
    const syms=COINS.filter(c=>c.symbol!=="USDT").map(c=>`${c.symbol.toLowerCase()}usdt@ticker`).join("/");
    const ws=new WebSocket(`wss://stream.binance.com:9443/stream?streams=${syms}`);wsRef.current=ws;
    ws.onopen=()=>{if(mountRef.current)setStatus("live")};
    ws.onmessage=(e)=>{if(!mountRef.current)return;try{const{data}=JSON.parse(e.data);if(!data)return;const sym=data.s.replace("USDT","");const price=parseFloat(data.c);const chg=parseFloat(data.P);if(!isNaN(price)){setPrices(p=>({...p,[sym]:price}));setChanges(p=>({...p,[sym]:chg}));setHistory(h=>{const arr=[...(h[sym]||[]),price].slice(-30);return{...h,[sym]:arr}});}}catch(e){}};
    ws.onclose=()=>{if(!mountRef.current)return;setStatus("reconnecting");setReconnects(r=>r+1);setTimeout(()=>{if(mountRef.current)connect();},3000);};
  },[]);
  useEffect(()=>{mountRef.current=true;connect();return()=>{mountRef.current=false;if(wsRef.current)wsRef.current.close();};},[connect]);

  const gp=sym=>sym==="USDT"?1:(prices[sym]||0);
  const rows=COINS.map(c=>({...c,price:gp(c.symbol),qty:quantities[c.symbol]||0,value:gp(c.symbol)*(quantities[c.symbol]||0),chg:changes[c.symbol]||0}));
  const visibleRows=rows.filter(r=>!hiddenCoins.includes(r.symbol));
  const usdtFree=(quantities["USDT"]||0)*1;
  const btcPrice=prices.BTC||1,totalCoins=rows.reduce((s,r)=>s+r.value,0),totalPort=totalCoins;
  const btcDom=totalPort>0?((quantities.BTC||0)*btcPrice/totalPort)*100:0;
  const totalChg=rows.reduce((s,r)=>s+r.value*(r.chg/100),0),totalChgPct=totalCoins>0?(totalChg/(totalCoins-totalChg))*100:0;
  const cats=["Todas",...new Set(COINS.map(c=>c.cat))];
  let dr=[...visibleRows];
  if(filterCat!=="Todas")dr=dr.filter(r=>r.cat===filterCat);
  if(sortBy==="value")dr.sort((a,b)=>b.value-a.value);
  if(sortBy==="change")dr.sort((a,b)=>b.chg-a.chg);
  if(sortBy==="price")dr.sort((a,b)=>b.price-a.price);
  if(sortBy==="name")dr.sort((a,b)=>a.symbol.localeCompare(b.symbol));
  const sc=status==="live"?"#00C853":status==="connecting"?"#FFB300":"#FF3D00";
  const wins=trades.filter(t=>t.resultado==="WIN").length;
  const losses=trades.filter(t=>t.resultado==="LOSS").length;
  const totalPnl=trades.reduce((s,t)=>s+(calcPnl(t)||0),0);
  const winRate=trades.length>0?(wins/trades.length)*100:0;

  const TABS=[
    ["dashboard","🏦 Dashboard"],
    ["graficos","📊 Gráficos"],
    ["operaciones","🎯 4 Comas"],
    ["dca","💰 Gestión DCA"],
    ["categorias","📂 Categorías"],
    ["intercambio","🔄 Intercambio"],
  ];

  const CoinManager=()=>(

      <div style={{background:"#0E0E1A",border:"1px solid rgba(247,147,26,0.3)",borderRadius:16,padding:24,width:"min(600px,95vw)",maxHeight:"80vh",overflowY:"auto"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>

            return(
              <div key={c.symbol} style={{background:isHidden?"rgba(255,255,255,0.02)":"rgba(247,147,26,0.07)",border:`1px solid ${isHidden?"rgba(255,255,255,0.08)":"rgba(247,147,26,0.25)"}`,borderRadius:8,padding:"10px 12px",opacity:isHidden?0.5:1}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                  <div><div style={{fontSize:13,fontWeight:800,color:isHidden?"#555570":"#E8E8F0"}}>{c.symbol}</div><div style={{fontSize:11,color:"#666680",marginTop:1}}>{c.cat}</div>{hasBalance&&<div style={{fontSize:10,color:"#F7931A",marginTop:2}}>💰 Con saldo</div>}</div>
                  <button onClick={()=>setHiddenCoins(h=>isHidden?h.filter(x=>x!==c.symbol):[...h,c.symbol])} style={{padding:"3px 8px",borderRadius:6,border:"none",cursor:"pointer",fontSize:11,fontWeight:700,background:isHidden?"rgba(0,200,83,0.2)":"rgba(255,61,0,0.15)",color:isHidden?"#00C853":"#FF6B6B"}}>{isHidden?"Mostrar":"Ocultar"}</button>
                </div>
              </div>
            );

        </div>
      </div>
    </div>
  );

  return(
    <div style={{minHeight:"100vh",background:"#07070F",color:"#E8E8F0",fontFamily:"DM Sans,sans-serif"}}>
      {showCoinManager&&<CoinManager/>}
      <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,backgroundImage:"linear-gradient(rgba(247,147,26,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(247,147,26,0.03) 1px,transparent 1px)",backgroundSize:"40px 40px",pointerEvents:"none",zIndex:0}}/>
      <div style={{position:"relative",zIndex:1,maxWidth:1400,margin:"0 auto",padding:"0 16px"}}>

        {/* HEADER */}
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"18px 0 14px",borderBottom:"1px solid rgba(247,147,26,0.15)"}}>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <div style={{width:40,height:40,borderRadius:10,background:"linear-gradient(135deg,#F7931A,#E65100)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,fontWeight:900,color:"#fff",boxShadow:"0 0 20px rgba(247,147,26,0.4)"}}>₿</div>
            <div>
              <div style={{fontSize:20,fontWeight:800,color:"#F7931A",letterSpacing:"-0.5px"}}>CryptoPortfolio Pro</div>
              <div style={{fontSize:13,color:"#CCCCDD"}}>Estrategia 4 Comas · Tiempo Real</div>
            </div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <div style={{display:"flex",alignItems:"center",gap:6}}>
              <div style={{width:7,height:7,borderRadius:"50%",background:sc,boxShadow:status==="live"?`0 0 8px ${sc}`:"none",animation:status==="live"?"pulse 2s infinite":"none"}}/>

            <span style={{fontSize:13,color:"#AAAACC",fontFamily:"Space Mono,monospace"}}>{time}</span>

              style={{background:tab===id?"rgba(247,147,26,0.15)":"transparent",

            </button>
          ))}
        </div>

        {/* ── DASHBOARD ── */}
        {tab==="dashboard"&&(
          <div style={{animation:"fadeIn 0.3s ease"}}>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(180px,1fr))",gap:14,padding:"22px 0 0"}}>
              {[
                {l:"Total Portafolio",v:fmtUSD(totalPort),s:fmtPct(totalChgPct)+" hoy",c:"#F7931A",sc:totalChgPct>=0?"#00FF6A":"#FF6B6B"},
                {l:"En Bitcoin",v:(totalPort/btcPrice).toFixed(6)+" BTC",s:"BTC: "+fmtUSD(btcPrice),c:"#FFFFFF"},
                {l:"Dominancia BTC",v:btcDom.toFixed(1)+"%",s:"de tu portafolio",c:"#90CAF9"},
                {l:"USDT Libre",v:fmtUSD(usdtFree),s:totalPort>0?((usdtFree/totalPort)*100).toFixed(1)+"% del total":"0% del total",c:"#00FF6A"},
                {l:"Monedas Activas",v:visibleRows.filter(r=>r.qty>0).length+" / "+visibleRows.length,s:"con saldo",c:"#D0BBFF"}
              ].map(({l,v,s,c,sc:sc2})=>(
                <div key={l} style={cardStyle(c)}>
                  <div style={labelStyle}>{l}</div>
                  <div style={{fontSize:20,fontWeight:800,color:c,letterSpacing:"-0.5px",lineHeight:1,marginTop:8}}>{v}</div>
                  <div style={{fontSize:13,color:sc2||"#AAAACC",marginTop:6,fontWeight:600}}>{s}</div>

            <div style={{marginTop:22,background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:14,overflow:"hidden"}}>

                <span style={{fontSize:14,fontWeight:700,color:"#FFFFFF"}}>Portafolio · {dr.length} activos</span>

                  {[["value","Valor"],["change","Cambio"],["price","Precio"],["name","A-Z"]].map(([s,l])=><button key={s} onClick={()=>setSortBy(s)} style={{padding:"4px 10px",borderRadius:6,border:"none",cursor:"pointer",fontSize:11,fontWeight:600,background:sortBy===s?"rgba(247,147,26,0.2)":"rgba(255,255,255,0.05)",color:sortBy===s?"#F7931A":"#AAAACC"}}>{l}</button>)}

                  <button onClick={()=>setEditMode(!editMode)} style={{padding:"6px 16px",borderRadius:8,border:"none",cursor:"pointer",fontSize:12,fontWeight:700,background:editMode?"#F7931A":"rgba(247,147,26,0.12)",color:editMode?"#000":"#F7931A"}}>{editMode?"✓ Guardar":"✏ Editar"}</button>
                </div>
              </div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap",padding:"10px 20px",borderBottom:"1px solid rgba(255,255,255,0.06)"}}>
                {cats.map(c=><button key={c} onClick={()=>setFilterCat(c)} style={{padding:"4px 12px",borderRadius:20,border:"none",cursor:"pointer",fontSize:11,fontWeight:600,background:filterCat===c?"#F7931A":"rgba(255,255,255,0.06)",color:filterCat===c?"#000":"#AAAACC"}}>{c}</button>)}
              </div>
              <div style={{display:"grid",gridTemplateColumns:"40px 1fr 115px 130px 105px 75px 70px",padding:"9px 20px",borderBottom:"1px solid rgba(255,255,255,0.06)",fontSize:13,color:"#DDDDEE",textTransform:"uppercase",letterSpacing:"0.6px",fontWeight:700}}>

              {dr.map((coin,i)=>{
                const wt=totalPort>0?(coin.value/totalPort)*100:0,isPos=coin.chg>=0;
                return(
                  <div key={coin.symbol} className="coin-row" style={{display:"grid",gridTemplateColumns:"40px 1fr 115px 130px 105px 75px 70px",padding:"10px 20px",borderBottom:"1px solid rgba(255,255,255,0.04)",background:i%2===0?"transparent":"rgba(255,255,255,0.015)",alignItems:"center"}}>
                    <div style={{fontSize:13,color:"#AAAACC",fontFamily:"Space Mono,monospace"}}>{(i+1).toString().padStart(2,"0")}</div>
                    <div style={{display:"flex",flexDirection:"column",gap:2}}>
                      <div style={{display:"flex",alignItems:"center",gap:6}}>
                        <span style={{fontSize:15,fontWeight:800,color:"#FFFFFF"}}>{coin.symbol}</span>
                        <span style={{fontSize:11,fontWeight:700,padding:"3px 8px",borderRadius:20,color:CC[coin.cat]||"#888",background:(CC[coin.cat]||"#888")+"22"}}>{coin.cat}</span>
                      </div>
                      <span style={{fontSize:13,color:"#DDDDEE"}}>{coin.name}</span>
                    </div>
                    <div style={{textAlign:"right"}}><FlashPrice price={coin.price}/></div>
                    <div style={{textAlign:"right"}}>
                      <div style={{fontFamily:"Space Mono,monospace",fontSize:14,color:coin.value>0?"#FFFFFF":"#444460",fontWeight:700}}>{fmtUSD(coin.value)}</div>
                      {coin.value>0&&<div style={{fontSize:12,color:"#F7931A",fontWeight:600}}>{wt.toFixed(1)}% portaf.</div>}
                    </div>
                    <div style={{textAlign:"right"}}>
                      {editMode
                        ?<input type="number" value={quantities[coin.symbol]||""} placeholder="0" onChange={e=>setQuantities(q=>({...q,[coin.symbol]:parseFloat(e.target.value)||0}))} style={{width:90,background:"rgba(247,147,26,0.1)",border:"1px solid rgba(247,147,26,0.4)",borderRadius:6,padding:"3px 6px",color:"#FFCC80",fontSize:12,fontFamily:"Space Mono,monospace",textAlign:"right",outline:"none"}}/>
                        :<span style={{fontFamily:"Space Mono,monospace",fontSize:12,color:coin.qty>0?"#FFFFFF":"#444460",fontWeight:coin.qty>0?600:400}}>{coin.qty>0?coin.qty.toLocaleString("en-US",{maximumFractionDigits:6}):"—"}</span>
                      }
                    </div>
                    <div style={{textAlign:"right",fontFamily:"Space Mono,monospace",fontSize:13,fontWeight:700,color:isPos?"#00FF6A":"#FF6B6B"}}>{coin.symbol!=="USDT"?fmtPct(coin.chg):"—"}</div>
                    <div style={{display:"flex",justifyContent:"flex-end"}}><Sparkline history={history[coin.symbol]} positive={isPos}/></div>
                  </div>
                );
              })}
              <div style={{display:"grid",gridTemplateColumns:"40px 1fr 115px 130px 105px 75px 70px",padding:"13px 20px",borderTop:"1px solid rgba(247,147,26,0.25)",background:"rgba(247,147,26,0.05)",alignItems:"center"}}>
                <div/><div style={{fontSize:13,fontWeight:800,color:"#F7931A"}}>TOTAL PORTAFOLIO</div><div/>
                <div style={{textAlign:"right",fontFamily:"Space Mono,monospace",fontSize:15,fontWeight:800,color:"#F7931A"}}>{fmtUSD(totalPort)}</div>
                <div/><div style={{textAlign:"right",fontFamily:"Space Mono,monospace",fontSize:13,fontWeight:700,color:totalChgPct>=0?"#00FF6A":"#FF6B6B"}}>{fmtPct(totalChgPct)}</div><div/>
              </div>
            </div>
            <div style={{height:40}}/>
          </div>
        )}

        {/* ── GRÁFICOS ── */}
        {tab==="graficos"&&(
          <div style={{animation:"fadeIn 0.3s ease",paddingTop:22}}>
            <div style={{display:"flex",gap:6,marginBottom:20,borderBottom:"1px solid rgba(255,255,255,0.07)",paddingBottom:8}}>
              {GRAF_TABS.map(([id,label])=>(
                <button key={id} onClick={()=>setGrafTab(id)} style={{padding:"8px 16px",borderRadius:8,border:"none",cursor:"pointer",fontSize:13,fontWeight:700,background:grafTab===id?"rgba(247,147,26,0.18)":"rgba(255,255,255,0.04)",color:grafTab===id?"#F7931A":"#AAAACC",borderBottom:grafTab===id?"2px solid #F7931A":"2px solid transparent",transition:"all 0.2s"}}>{label}</button>
              ))}
            </div>
            {grafTab==="equity"&&(<div style={cardStyle("#00C853")}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}><div><div style={{fontSize:15,fontWeight:800,color:"#FFFFFF"}}>📈 Curva de Equity</div><div style={{fontSize:13,color:"#DDDDEE",marginTop:2}}>Ganancias acumuladas</div></div><div style={{textAlign:"right"}}><div style={{fontSize:22,fontWeight:800,color:totalPnl>=0?"#00FF6A":"#FF6B6B",fontFamily:"Space Mono,monospace"}}>{(totalPnl>=0?"+":"")+"$"+totalPnl.toFixed(2)}</div><div style={{fontSize:13,color:"#DDDDEE"}}>P&L Total</div></div></div><EquityChart trades={trades}/></div>)}
            {grafTab==="winrate"&&(<div style={cardStyle("#F7931A")}><div style={{fontSize:15,fontWeight:800,color:"#FFFFFF",marginBottom:16}}>🎯 Win Rate</div><WinRateDonut wins={wins} losses={losses}/><div style={{marginTop:16,display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>{[{l:"Win Rate",v:winRate.toFixed(1)+"%",c:"#F7931A"},{l:"Mejor Trade",v:trades.length>0?"+$"+Math.max(...trades.map(t=>calcPnl(t)||0)).toFixed(2):"—",c:"#00FF6A"},{l:"Peor Trade",v:trades.length>0?"$"+Math.min(...trades.map(t=>calcPnl(t)||0)).toFixed(2):"—",c:"#FF6B6B"}].map(({l,v,c})=>(<div key={l} style={{background:"rgba(255,255,255,0.04)",borderRadius:8,padding:"10px 12px",textAlign:"center"}}><div style={{fontSize:13,color:"#DDDDEE",marginBottom:4}}>{l}</div><div style={{fontSize:15,fontWeight:800,color:c,fontFamily:"Space Mono,monospace"}}>{v}</div></div>))}</div></div>)}
            {grafTab==="pnl"&&(<div style={cardStyle("#1D6FD1")}><div style={{fontSize:15,fontWeight:800,color:"#FFFFFF",marginBottom:16}}>💹 P&L por Operación</div>{trades.length===0?<div style={{padding:"30px 0",textAlign:"center",color:"#666680",fontSize:14}}>Sin operaciones aún</div>:<PnlBars trades={trades}/>}</div>)}
            {grafTab==="cats"&&(
              <div style={cardStyle("#7B61FF")}>
                <div style={{fontSize:15,fontWeight:800,color:"#FFFFFF",marginBottom:16}}>🗂 Distribución por Categoría</div>
                {Object.entries(COINS.reduce((acc,c)=>{if(!acc[c.cat])acc[c.cat]=0;acc[c.cat]+=(quantities[c.symbol]||0)*(gp(c.symbol));return acc;},{})).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]).length===0
                  ?<div style={{padding:"30px 0",textAlign:"center",color:"#666680",fontSize:14}}>Agrega cantidades en el Dashboard para ver la distribución</div>
                  :<div style={{display:"flex",flexDirection:"column",gap:10}}>{Object.entries(COINS.reduce((acc,c)=>{if(!acc[c.cat])acc[c.cat]=0;acc[c.cat]+=(quantities[c.symbol]||0)*(gp(c.symbol));return acc;},{})).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]).map(([cat,val])=>{const pct=totalPort>0?(val/totalPort)*100:0,color=CC[cat]||"#888";return(<div key={cat} style={{display:"flex",alignItems:"center",gap:12}}><div style={{width:90,fontSize:13,color:"#DDDDEE",textAlign:"right",fontWeight:600}}>{cat}</div><div style={{flex:1,height:24,background:"rgba(255,255,255,0.06)",borderRadius:4,overflow:"hidden",position:"relative"}}><div style={{position:"absolute",top:0,left:0,height:"100%",width:`${Math.min(pct*3,100)}%`,background:color,opacity:0.85,borderRadius:4}}/><span style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",fontSize:12,fontWeight:700,color:"#fff"}}>{fmtUSD(val)}</span></div><div style={{width:50,fontSize:13,fontWeight:700,color,fontFamily:"Space Mono,monospace",textAlign:"right"}}>{pct.toFixed(1)}%</div></div>);})}</div>}
              </div>
            )}
            <div style={{height:40}}/>
          </div>
        )}

        {tab==="operaciones"&&<FourCommas trades={trades} setTrades={setTrades} prices={prices}/>}
        {tab==="dca"&&<DCAPanel prices={prices}/>}
        {tab==="categorias"&&<Categories rows={visibleRows} totalPort={totalPort}/>}
        {tab==="intercambio"&&<Intercambio prices={prices}/>}
      </div>
    </div>
  );
}

// ── 4 COMAS ───────────────────────────────────────────────────
function FourCommas({trades,setTrades,prices}){
  const E={par:"",tipo:"LONG",qty:"",qtyMode:"crypto",entrada:"",salida:"",resultado:"",fecha:""};
  const[nt,setNt]=useState(E);
  const[showForm,setShowForm]=useState(false);
  const[editIdx,setEditIdx]=useState(null);
  const[confirmDel,setConfirmDel]=useState(null);
  const wins=trades.filter(t=>t.resultado==="WIN").length;
  const totalPnl=trades.reduce((s,t)=>s+(calcPnl(t)||0),0);
  const wr=trades.length>0?(wins/trades.length)*100:0;
  const pnlPreview=useMemo(()=>calcPnl(nt),[nt]);
  const handleEdit=(t,i)=>{setNt({...t});setEditIdx(i);setShowForm(true);window.scrollTo({top:0,behavior:"smooth"});};
  const handleSave=()=>{if(!nt.par)return;if(editIdx!==null){const n=[...trades];n[editIdx]=nt;setTrades(n);setEditIdx(null);}else{setTrades(t=>[...t,nt]);}setNt(E);setShowForm(false);};
  const handleDelete=(i)=>{setTrades(t=>t.filter((_,idx)=>idx!==i));setConfirmDel(null);};
  const handleCancel=()=>{setShowForm(false);setNt(E);setEditIdx(null);};
  const inputStyle={width:"100%",background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.14)",borderRadius:6,padding:"8px 10px",color:"#FFFFFF",fontSize:13,outline:"none"};
  const selStyle={width:"100%",background:"#1A1A2E",border:"1px solid rgba(255,255,255,0.14)",borderRadius:6,padding:"8px 10px",color:"#FFFFFF",fontSize:13,outline:"none"};
  return(
    <div style={{animation:"fadeIn 0.3s ease"}}>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:12,padding:"22px 0 0"}}>
        {[{l:"Trades",v:trades.length,c:"#F7931A"},{l:"Ganadas",v:wins,c:"#00FF6A"},{l:"Perdidas",v:trades.filter(t=>t.resultado==="LOSS").length,c:"#FF6B6B"},{l:"Win Rate",v:wr.toFixed(1)+"%",c:wr>=50?"#00FF6A":"#FF6B6B"},{l:"P&L Total",v:(totalPnl>=0?"+":"")+"$"+totalPnl.toFixed(2),c:totalPnl>=0?"#00FF6A":"#FF6B6B"}].map(({l,v,c})=>(
          <div key={l} style={cardStyle(c)}><div style={labelStyle}>{l}</div><div style={{fontSize:20,fontWeight:800,color:c,letterSpacing:"-0.5px",marginTop:8}}>{v}</div></div>
        ))}
      </div>
      <div style={{display:"flex",justifyContent:"flex-end",padding:"18px 0 8px"}}>
        <button onClick={()=>{if(showForm&&editIdx===null){handleCancel();}else{setEditIdx(null);setNt(E);setShowForm(!showForm);}}} style={{padding:"9px 22px",borderRadius:8,border:"none",cursor:"pointer",fontSize:13,fontWeight:700,background:showForm?"rgba(255,255,255,0.06)":"linear-gradient(135deg,#F7931A,#E65100)",color:showForm?"#AAAACC":"#000"}}>
          {showForm?"✕ Cancelar":"+ Nueva Operación"}
        </button>
      </div>
      {showForm&&(
        <div style={{background:editIdx!==null?"rgba(29,111,209,0.08)":"rgba(247,147,26,0.06)",border:`1px solid ${editIdx!==null?"rgba(29,111,209,0.35)":"rgba(247,147,26,0.25)"}`,borderRadius:12,padding:20,marginBottom:16,animation:"fadeIn 0.2s ease"}}>
          {editIdx!==null&&<div style={{marginBottom:14,padding:"8px 14px",background:"rgba(29,111,209,0.18)",borderRadius:8,fontSize:13,color:"#90CAF9",fontWeight:700}}>✏️ Editando operación #{editIdx+1} — {trades[editIdx]?.par}</div>}
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:12}}>
            <div><div style={{fontSize:13,color:"#DDDDEE",marginBottom:4,fontWeight:600}}>Par</div><select style={selStyle} value={nt.par} onChange={e=>setNt(n=>({...n,par:e.target.value}))}><option value="">— Seleccionar —</option>{CRYPTO_PAIRS.map(p=><option key={p} value={p}>{p}</option>)}</select></div>
            <div><div style={{fontSize:13,color:"#DDDDEE",marginBottom:4,fontWeight:600}}>Tipo</div><select style={selStyle} value={nt.tipo} onChange={e=>setNt(n=>({...n,tipo:e.target.value}))}><option value="LONG">LONG</option><option value="SHORT">SHORT</option></select></div>
            <div><div style={{fontSize:13,color:"#DDDDEE",marginBottom:4,fontWeight:600}}>Cantidad</div><div style={{display:"flex",gap:4,marginBottom:5}}>{["crypto","usd"].map(mode=>(<button key={mode} onClick={()=>setNt(n=>({...n,qtyMode:mode}))} style={{flex:1,padding:"4px 0",borderRadius:5,border:"none",cursor:"pointer",fontSize:11,fontWeight:700,background:nt.qtyMode===mode?"rgba(247,147,26,0.3)":"rgba(255,255,255,0.05)",color:nt.qtyMode===mode?"#F7931A":"#AAAACC"}}>{mode==="crypto"?"🔷 Crypto":"💵 USD"}</button>))}</div><input style={inputStyle} placeholder={nt.qtyMode==="crypto"?"0.05":"100.00"} value={nt.qty} onChange={e=>setNt(n=>({...n,qty:e.target.value}))}/></div>
            <div><div style={{fontSize:13,color:"#DDDDEE",marginBottom:4,fontWeight:600}}>Entrada</div><input style={inputStyle} placeholder="65000" value={nt.entrada} onChange={e=>setNt(n=>({...n,entrada:e.target.value}))}/></div>
            <div><div style={{fontSize:13,color:"#DDDDEE",marginBottom:4,fontWeight:600}}>Salida</div><input style={inputStyle} placeholder="67800" value={nt.salida} onChange={e=>setNt(n=>({...n,salida:e.target.value}))}/></div>
            <div><div style={{fontSize:13,color:"#DDDDEE",marginBottom:4,fontWeight:600}}>Resultado</div><select style={selStyle} value={nt.resultado} onChange={e=>setNt(n=>({...n,resultado:e.target.value}))}><option value="">—</option><option value="WIN">WIN ✅</option><option value="LOSS">LOSS ❌</option></select></div>
            <div><div style={{fontSize:13,color:"#DDDDEE",marginBottom:4,fontWeight:600}}>Fecha (DD-MM-YYYY)</div><input style={inputStyle} placeholder="12-03-2026" value={nt.fecha} onChange={e=>setNt(n=>({...n,fecha:e.target.value}))}/><button onClick={()=>setNt(n=>({...n,fecha:hoy()}))} style={{marginTop:6,width:"100%",padding:"5px 0",borderRadius:6,border:"none",cursor:"pointer",fontSize:12,fontWeight:700,background:"rgba(247,147,26,0.15)",color:"#F7931A"}}>📅 Fecha Actual</button></div>
            <div style={{display:"flex",flexDirection:"column",gap:8,justifyContent:"flex-end"}}>
              {pnlPreview!==null&&(<div style={{padding:"8px 12px",borderRadius:8,background:pnlPreview>=0?"rgba(0,200,83,0.15)":"rgba(255,61,0,0.15)",textAlign:"center"}}><div style={{fontSize:11,color:"#DDDDEE"}}>P&L Preview</div><div style={{fontSize:15,fontWeight:800,color:pnlPreview>=0?"#00FF6A":"#FF6B6B",fontFamily:"Space Mono,monospace"}}>{(pnlPreview>=0?"+":"")+"$"+pnlPreview.toFixed(2)}</div></div>)}
              <button onClick={handleSave} style={{padding:10,borderRadius:8,border:"none",cursor:"pointer",fontSize:13,fontWeight:700,background:editIdx!==null?"linear-gradient(135deg,#1D6FD1,#0D47A1)":"linear-gradient(135deg,#00C853,#00875A)",color:"#fff"}}>{editIdx!==null?"💾 Guardar cambios":"✓ Agregar operación"}</button>
              {editIdx!==null&&<button onClick={handleCancel} style={{padding:"8px 12px",borderRadius:8,border:"none",cursor:"pointer",fontSize:13,fontWeight:700,background:"rgba(255,255,255,0.06)",color:"#AAAACC"}}>✕ Cancelar</button>}
            </div>
          </div>
        </div>
      )}
      <div style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:14,overflowX:"auto"}}>
        <div style={{display:"grid",gridTemplateColumns:"85px 110px 60px 85px 90px 90px 75px 90px 160px 85px",padding:"10px 16px",borderBottom:"1px solid rgba(255,255,255,0.07)",fontSize:12,color:"#DDDDEE",textTransform:"uppercase",letterSpacing:"0.6px",minWidth:900,fontWeight:700}}>
          {["Fecha","Par","Tipo","Cantidad","Entrada","Salida","Result.","P&L","Estado Live","Acciones"].map(h=><div key={h} style={{textAlign:"right",...(h==="Par"||h==="Tipo"||h==="Acciones"||h==="Estado Live"?{textAlign:"left"}:{})}}>{h}</div>)}
        </div>
        {trades.length===0&&<div style={{padding:"40px 20px",textAlign:"center",color:"#555570",fontSize:14}}>No hay operaciones. Haz clic en "+ Nueva Operación".</div>}
        {trades.map((t,i)=>{
          const pnl=calcPnl(t);const isWin=t.resultado==="WIN";const isEditing=editIdx===i;
          const isClosed=!!t.salida&&!!t.resultado;
          const qtyLabel=t.qty?(t.qtyMode==="usd"?"$"+parseFloat(t.qty).toFixed(2):parseFloat(t.qty).toFixed(4)):"—";
          const live=!isClosed?calcPnlLive(t,prices):null;
          return(
            <div key={i} style={{display:"grid",gridTemplateColumns:"85px 110px 60px 85px 90px 90px 75px 90px 160px 85px",padding:"10px 16px",alignItems:"center",borderBottom:"1px solid rgba(255,255,255,0.03)",background:isEditing?"rgba(29,111,209,0.08)":i%2===0?"transparent":"rgba(255,255,255,0.015)",minWidth:900}}>
              <div style={{fontSize:12,color:"#AAAACC",fontFamily:"Space Mono,monospace"}}>{t.fecha||"—"}</div>
              <div style={{fontSize:14,fontWeight:700,color:"#FFFFFF"}}>{t.par}</div>
              <div style={{fontSize:11,fontWeight:700,padding:"2px 8px",borderRadius:4,textAlign:"center",background:t.tipo==="LONG"?"rgba(0,200,83,0.18)":"rgba(255,61,0,0.18)",color:t.tipo==="LONG"?"#00FF6A":"#FF6B6B"}}>{t.tipo}</div>
              <div style={{textAlign:"right",fontFamily:"Space Mono,monospace",fontSize:12,color:"#FFFFFF"}}>{qtyLabel}</div>
              <div style={{textAlign:"right",fontFamily:"Space Mono,monospace",fontSize:12,color:"#90CAF9"}}>{t.entrada?"$"+parseFloat(t.entrada).toLocaleString():"—"}</div>
              <div style={{textAlign:"right",fontFamily:"Space Mono,monospace",fontSize:12,color:"#FFCC80"}}>{t.salida?"$"+parseFloat(t.salida).toLocaleString():"—"}</div>
              <div style={{textAlign:"center"}}><span style={{fontSize:11,fontWeight:700,padding:"2px 7px",borderRadius:20,background:isWin?"rgba(0,200,83,0.2)":t.resultado?"rgba(255,61,0,0.2)":"transparent",color:isWin?"#00FF6A":t.resultado?"#FF6B6B":"#555570"}}>{t.resultado||"—"}</span></div>
              <div style={{textAlign:"right",fontFamily:"Space Mono,monospace",fontSize:12,fontWeight:700,color:pnl===null?"#444460":pnl>=0?"#00FF6A":"#FF6B6B"}}>{pnl===null?"—":(pnl>=0?"+":"")+"$"+pnl.toFixed(2)}</div>
              <div>{isClosed?(<span style={{fontSize:11,padding:"3px 8px",borderRadius:6,background:"rgba(255,255,255,0.06)",color:"#888899"}}>⚪ Cerrada</span>):live?(<div style={{background:live.pnl>=0?"rgba(0,200,83,0.12)":"rgba(255,61,0,0.12)",borderRadius:6,padding:"4px 8px",border:`1px solid ${live.pnl>=0?"rgba(0,200,83,0.25)":"rgba(255,61,0,0.25)"}`}}><div style={{fontSize:11,fontWeight:800,color:live.pnl>=0?"#00FF6A":"#FF6B6B",fontFamily:"Space Mono,monospace"}}>{(live.pnl>=0?"+":"")+"$"+live.pnl.toFixed(2)}</div><div style={{display:"flex",alignItems:"center",gap:6,marginTop:2}}><div style={{flex:1,height:4,background:"rgba(255,255,255,0.08)",borderRadius:2,overflow:"hidden"}}><div style={{height:"100%",width:`${Math.min(Math.abs(live.pct),100)}%`,background:live.pnl>=0?"#00C853":"#FF3D00",borderRadius:2}}/></div><span style={{fontSize:10,fontWeight:700,color:live.pnl>=0?"#00FF6A":"#FF6B6B"}}>{(live.pct>=0?"+":"")+live.pct.toFixed(2)}%</span></div><div style={{fontSize:9,color:"#888899",marginTop:1}}>Live: {fmt(live.precioActual)}</div></div>):(<span style={{fontSize:11,padding:"3px 8px",borderRadius:6,background:"rgba(255,183,0,0.1)",color:"#FFD54F"}}>🟡 Abierta</span>)}</div>
              <div style={{display:"flex",gap:5,alignItems:"center"}}>
                <button onClick={()=>handleEdit(t,i)} style={{padding:"4px 8px",borderRadius:6,border:"none",cursor:"pointer",fontSize:13,background:"rgba(29,111,209,0.2)",color:"#90CAF9",fontWeight:700}}>✏️</button>
                {confirmDel===i?(<div style={{display:"flex",gap:4}}><button onClick={()=>handleDelete(i)} style={{padding:"4px 7px",borderRadius:6,border:"none",cursor:"pointer",fontSize:11,fontWeight:700,background:"rgba(255,61,0,0.3)",color:"#FF6B6B"}}>Sí</button><button onClick={()=>setConfirmDel(null)} style={{padding:"4px 7px",borderRadius:6,border:"none",cursor:"pointer",fontSize:11,fontWeight:700,background:"rgba(255,255,255,0.06)",color:"#AAAACC"}}>No</button></div>):(<button onClick={()=>setConfirmDel(i)} style={{padding:"4px 8px",borderRadius:6,border:"none",cursor:"pointer",fontSize:13,background:"rgba(255,61,0,0.15)",color:"#FF6B6B",fontWeight:700}}>🗑️</button>)}
              </div>
            </div>
          );
        })}
        <div style={{display:"grid",gridTemplateColumns:"85px 110px 60px 85px 90px 90px 75px 90px 160px 85px",padding:"12px 16px",borderTop:"1px solid rgba(247,147,26,0.25)",background:"rgba(247,147,26,0.05)",minWidth:900}}>
          <div style={{gridColumn:"1/8",fontSize:13,fontWeight:800,color:"#F7931A"}}>P&L ACUMULADO</div>
          <div style={{textAlign:"right",fontFamily:"Space Mono,monospace",fontSize:15,fontWeight:800,color:totalPnl>=0?"#00FF6A":"#FF6B6B"}}>{(totalPnl>=0?"+":"")+"$"+totalPnl.toFixed(2)}</div>
          <div/><div/>
        </div>
      </div>
      <div style={{height:40}}/>
    </div>
  );
}

function Categories({rows,totalPort}){
  const bc={};rows.forEach(r=>{if(!bc[r.cat])bc[r.cat]={value:0,coins:[],change:0};bc[r.cat].value+=r.value;bc[r.cat].coins.push(r.symbol);bc[r.cat].change+=r.value*(r.chg/100);});
  return(
    <div style={{animation:"fadeIn 0.3s ease",paddingTop:22}}>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(270px,1fr))",gap:14}}>
        {Object.entries(bc).sort((a,b)=>b[1].value-a[1].value).map(([cat,data])=>{
          const pct=totalPort>0?(data.value/totalPort)*100:0,color=CC[cat]||"#888",chgPct=data.value>0?(data.change/(data.value-data.change))*100:0;
          return(
            <div key={cat} style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.08)",borderLeft:`4px solid ${color}`,borderRadius:12,padding:"16px 18px"}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
                <div><div style={{fontSize:14,fontWeight:800,color:"#FFFFFF"}}>{cat}</div><div style={{fontSize:13,color:"#DDDDEE",marginTop:2}}>{data.coins.slice(0,6).join(" · ")}{data.coins.length>6?" ...":""}</div></div>
                <div style={{textAlign:"right"}}>
                  <div style={{fontSize:16,fontWeight:800,color,fontFamily:"Space Mono,monospace"}}>{pct.toFixed(1)}%</div>
                  <div style={{fontSize:12,color:chgPct>=0?"#00FF6A":"#FF6B6B",marginTop:2,fontWeight:600}}>{(chgPct>=0?"+":"")+chgPct.toFixed(2)}% hoy</div>
                </div>
              </div>
              <div style={{height:4,background:"rgba(255,255,255,0.07)",borderRadius:2,marginBottom:10}}><div style={{height:4,borderRadius:2,width:`${Math.min(pct*3,100)}%`,background:color}}/></div>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:13}}>
                <span style={{color:"#AAAACC"}}>{data.coins.length} activos</span>
                <span style={{fontFamily:"Space Mono,monospace",fontWeight:700,color:"#FFFFFF"}}>{fmtUSD(data.value)}</span>
              </div>
            </div>
          );
        })}
      </div>
      <div style={{height:40}}/>
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
