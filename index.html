<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CryptoPortfolio Pro</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#07070F;color:#E8E8F0;font-family:'DM Sans',sans-serif}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .coin-row:hover{background:rgba(247,147,26,0.05)!important}
  ::-webkit-scrollbar{width:4px}
  ::-webkit-scrollbar-thumb{background:rgba(247,147,26,0.3);border-radius:2px}
  select option{background:#1A1A2E;color:#E8E8F0}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useRef,useCallback}=React;
const COINS=[
  {symbol:"BTC",name:"Bitcoin",cat:"Layer 1"},{symbol:"ETH",name:"Ethereum",cat:"Layer 1"},
  {symbol:"BNB",name:"BNB",cat:"Exchange"},{symbol:"SOL",name:"Solana",cat:"Layer 1"},
  {symbol:"XRP",name:"XRP",cat:"Layer 1"},{symbol:"ADA",name:"Cardano",cat:"Layer 1"},
  {symbol:"DOGE",name:"Dogecoin",cat:"Meme"},{symbol:"AVAX",name:"Avalanche",cat:"Layer 1"},
  {symbol:"DOT",name:"Polkadot",cat:"Infraestr."},{symbol:"LINK",name:"Chainlink",cat:"DeFi"},
  {symbol:"MATIC",name:"Polygon",cat:"Layer 2"},{symbol:"UNI",name:"Uniswap",cat:"DeFi"},
  {symbol:"LTC",name:"Litecoin",cat:"Layer 1"},{symbol:"ATOM",name:"Cosmos",cat:"Infraestr."},
  {symbol:"FIL",name:"Filecoin",cat:"Infraestr."},{symbol:"NEAR",name:"NEAR",cat:"Infraestr."},
  {symbol:"ICP",name:"Internet Computer",cat:"Infraestr."},{symbol:"APT",name:"Aptos",cat:"Nueva L1"},
  {symbol:"ARB",name:"Arbitrum",cat:"Layer 2"},{symbol:"OP",name:"Optimism",cat:"Layer 2"},
  {symbol:"INJ",name:"Injective",cat:"DeFi"},{symbol:"TIA",name:"Celestia",cat:"Nueva L1"},
  {symbol:"SUI",name:"Sui",cat:"Nueva L1"},{symbol:"SEI",name:"Sei",cat:"Nueva L1"},
  {symbol:"WLD",name:"Worldcoin",cat:"AI & Datos"},{symbol:"RENDER",name:"Render",cat:"AI & Datos"},
  {symbol:"FET",name:"Fetch.ai",cat:"AI & Datos"},{symbol:"PEPE",name:"Pepe",cat:"Meme"},
  {symbol:"BONK",name:"Bonk",cat:"Meme"},{symbol:"USDT",name:"Tether",cat:"Stablecoin"},
];
const CC={"Layer 1":"#F7931A","Layer 2":"#1D6FD1","DeFi":"#00875A","Infraestr.":"#7B61FF","AI & Datos":"#00BCD4","Nueva L1":"#E91E8C","Exchange":"#FFB300","Meme":"#FF5722","Stablecoin":"#4CAF50"};
const fmt=n=>{if(!n&&n!==0)return"—";if(n>=1000)return"$"+n.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});if(n>=1)return"$"+n.toFixed(2);if(n>=0.01)return"$"+n.toFixed(4);return"$"+n.toFixed(8)};
const fmtUSD=n=>"$"+(n||0).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtPct=n=>isNaN(n)?"—":(n>=0?"+":"")+n.toFixed(2)+"%";

function Sparkline({history,positive}){
  if(!history||history.length<2)return<div style={{width:64,height:28}}/>;
  const min=Math.min(...history),max=Math.max(...history),range=max-min||1,w=64,h=28;
  const pts=history.map((v,i)=>`${(i/(history.length-1))*w},${h-((v-min)/range)*(h-4)-2}`).join(" ");
  return<svg width={w} height={h} style={{display:"block"}}><polyline points={pts} fill="none" stroke={positive?"#00C853":"#FF3D00"} strokeWidth="1.5" strokeLinejoin="round" strokeLinecap="round" opacity="0.85"/></svg>;
}

function FlashPrice({price}){
  const[flash,setFlash]=useState(null),prev=useRef(price);
  useEffect(()=>{
    if(prev.current!==price&&prev.current!==undefined){
      setFlash(price>prev.current?"up":"down");
      const t=setTimeout(()=>setFlash(null),600);
      prev.current=price;return()=>clearTimeout(t);
    }prev.current=price;
  },[price]);
  return<span style={{fontFamily:"'Space Mono',monospace",fontSize:13,fontWeight:700,color:"#E8E8F0",background:flash==="up"?"rgba(0,200,83,0.2)":flash==="down"?"rgba(255,61,0,0.2)":"transparent",borderRadius:4,padding:"1px 4px",transition:"background 0.3s"}}>{fmt(price)}</span>;
}

function App(){
  const[prices,setPrices]=useState({});
  const[changes,setChanges]=useState({});
  const[history,setHistory]=useState({});
  const[status,setStatus]=useState("connecting");
  const[reconnects,setReconnects]=useState(0);
  const[quantities,setQuantities]=useState(()=>{const q={};COINS.forEach(c=>q[c.symbol]=0);q.BTC=0.05;q.ETH=0.5;q.SOL=5;q.BNB=2;return q;});
  const[usdtFree,setUsdtFree]=useState(1500);
  const[editMode,setEditMode]=useState(false);
  const[tab,setTab]=useState("dashboard");
  const[sortBy,setSortBy]=useState("value");
  const[filterCat,setFilterCat]=useState("Todas");
  const[time,setTime]=useState(new Date().toLocaleTimeString("es-ES"));
  const wsRef=useRef(null),mountRef=useRef(true);

  useEffect(()=>{const t=setInterval(()=>setTime(new Date().toLocaleTimeString("es-ES")),1000);return()=>clearInterval(t);},[]);

  const connect=useCallback(()=>{
    if(!mountRef.current)return;
    setStatus("connecting");
    const syms=COINS.filter(c=>c.symbol!=="USDT").map(c=>`${c.symbol.toLowerCase()}usdt@ticker`).join("/");
    const ws=new WebSocket(`wss://stream.binance.com:9443/stream?streams=${syms}`);
    wsRef.current=ws;
    ws.onopen=()=>{if(mountRef.current)setStatus("live")};
    ws.onmessage=(e)=>{
      if(!mountRef.current)return;
      try{const{data}=JSON.parse(e.data);if(!data)return;const sym=data.s.replace("USDT","");const price=parseFloat(data.c);const chg=parseFloat(data.P);
        if(!isNaN(price)){setPrices(p=>({...p,[sym]:price}));setChanges(p=>({...p,[sym]:chg}));setHistory(h=>{const arr=[...(h[sym]||[]),price].slice(-30);return{...h,[sym]:arr}});}}catch(e){}};
    ws.onclose=()=>{if(!mountRef.current)return;setStatus("reconnecting");setReconnects(r=>r+1);setTimeout(()=>{if(mountRef.current)connect();},3000);};
  },[]);

  useEffect(()=>{mountRef.current=true;connect();return()=>{mountRef.current=false;if(wsRef.current)wsRef.current.close();};},[connect]);

  const gp=sym=>sym==="USDT"?1:(prices[sym]||0);
  const rows=COINS.map(c=>({...c,price:gp(c.symbol),qty:quantities[c.symbol]||0,value:gp(c.symbol)*(quantities[c.symbol]||0),chg:changes[c.symbol]||0}));
  const btcPrice=prices.BTC||1,totalCoins=rows.reduce((s,r)=>s+r.value,0),totalPort=totalCoins+usdtFree;
  const btcDom=totalPort>0?((quantities.BTC||0)*btcPrice/totalPort)*100:0;
  const totalChg=rows.reduce((s,r)=>s+r.value*(r.chg/100),0),totalChgPct=totalCoins>0?(totalChg/(totalCoins-totalChg))*100:0;
  const cats=["Todas",...new Set(COINS.map(c=>c.cat))];
  let dr=[...rows];
  if(filterCat!=="Todas")dr=dr.filter(r=>r.cat===filterCat);
  if(sortBy==="value")dr.sort((a,b)=>b.value-a.value);
  if(sortBy==="change")dr.sort((a,b)=>b.chg-a.chg);
  if(sortBy==="price")dr.sort((a,b)=>b.price-a.price);
  if(sortBy==="name")dr.sort((a,b)=>a.symbol.localeCompare(b.symbol));
  const sc=status==="live"?"#00C853":status==="connecting"?"#FFB300":"#FF3D00";

  return(
    <div style={{minHeight:"100vh",background:"#07070F",color:"#E8E8F0",fontFamily:"'DM Sans',sans-serif"}}>
      <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,backgroundImage:"linear-gradient(rgba(247,147,26,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(247,147,26,0.03) 1px,transparent 1px)",backgroundSize:"40px 40px",pointerEvents:"none",zIndex:0}}/>
      <div style={{position:"relative",zIndex:1,maxWidth:1400,margin:"0 auto",padding:"0 20px"}}>
        {/* HEADER */}
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"20px 0 16px",borderBottom:"1px solid rgba(247,147,26,0.15)"}}>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <div style={{width:40,height:40,borderRadius:10,background:"linear-gradient(135deg,#F7931A,#E65100)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,fontWeight:900,color:"#fff",boxShadow:"0 0 20px rgba(247,147,26,0.4)"}}>₿</div>
            <div>
              <div style={{fontSize:18,fontWeight:800,color:"#F7931A",letterSpacing:"-0.5px"}}>CryptoPortfolio Pro</div>
              <div style={{fontSize:11,color:"#666680"}}>Estrategia 4 Comas · Tiempo Real</div>
            </div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:16}}>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <div style={{width:8,height:8,borderRadius:"50%",background:sc,boxShadow:status==="live"?`0 0 8px ${sc}`:"none",animation:status==="live"?"pulse 2s infinite":"none"}}/>
              <span style={{fontSize:11,color:sc,fontFamily:"'Space Mono',monospace"}}>{status==="live"?"BINANCE LIVE":status==="connecting"?"CONECTANDO...":"RECONECTANDO ("+reconnects+")"}</span>
            </div>
            <span style={{fontSize:11,color:"#444460",fontFamily:"'Space Mono',monospace"}}>{time}</span>
          </div>
        </div>
        {/* TABS */}
        <div style={{display:"flex",gap:4,padding:"16px 0 0"}}>
          {[["dashboard","🏦 Dashboard"],["operaciones","🎯 4 Comas"],["categorias","📂 Categorías"]].map(([id,label])=>(
            <button key={id} onClick={()=>setTab(id)} style={{padding:"8px 20px",borderRadius:8,border:"none",cursor:"pointer",fontSize:13,fontWeight:600,background:tab===id?"rgba(247,147,26,0.15)":"transparent",color:tab===id?"#F7931A":"#666680",borderBottom:tab===id?"2px solid #F7931A":"2px solid transparent",transition:"all 0.2s"}}>{label}</button>
          ))}
        </div>

        {/* DASHBOARD */}
        {tab==="dashboard"&&(
          <div style={{animation:"fadeIn 0.3s ease"}}>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(190px,1fr))",gap:16,padding:"24px 0 0"}}>
              {[
                {l:"Total Portafolio",v:fmtUSD(totalPort),s:fmtPct(totalChgPct)+" hoy",c:"#F7931A",sc:totalChgPct>=0?"#00C853":"#FF3D00"},
                {l:"En Bitcoin",v:(totalPort/btcPrice).toFixed(6)+" BTC",s:"BTC: "+fmtUSD(btcPrice),c:"#E8E8F0"},
                {l:"Dominancia BTC",v:btcDom.toFixed(1)+"%",s:"de tu portafolio",c:"#1D6FD1"},
                {l:"USDT Libre",v:fmtUSD(usdtFree),s:((usdtFree/totalPort)*100).toFixed(1)+"% del total",c:"#00C853"},
                {l:"Monedas Activas",v:rows.filter(r=>r.qty>0).length+" / 30",s:"con saldo",c:"#7B61FF"},
              ].map(({l,v,s,c,sc:sc2})=>(
                <div key={l} style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)",borderTop:`3px solid ${c}`,borderRadius:12,padding:"20px 20px 16px"}}>
                  <div style={{fontSize:11,color:"#666680",textTransform:"uppercase",letterSpacing:"0.8px",marginBottom:8}}>{l}</div>
                  <div style={{fontSize:22,fontWeight:800,color:c,letterSpacing:"-0.5px",lineHeight:1}}>{v}</div>
                  <div style={{fontSize:12,color:sc2||"#888899",marginTop:6}}>{s}</div>
                </div>
              ))}
            </div>
            <div style={{marginTop:24,background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:14,overflow:"hidden"}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"16px 20px",borderBottom:"1px solid rgba(255,255,255,0.05)",flexWrap:"wrap",gap:8}}>
                <span style={{fontSize:13,fontWeight:700}}>Portafolio · {dr.length} activos</span>
                <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
                  <span style={{fontSize:11,color:"#555570"}}>Ordenar:</span>
                  {[["value","Valor"],["change","Cambio"],["price","Precio"],["name","A-Z"]].map(([s,l])=>(
                    <button key={s} onClick={()=>setSortBy(s)} style={{padding:"4px 10px",borderRadius:6,border:"none",cursor:"pointer",fontSize:11,fontWeight:600,background:sortBy===s?"rgba(247,147,26,0.2)":"rgba(255,255,255,0.04)",color:sortBy===s?"#F7931A":"#666680"}}>{l}</button>
                  ))}
                  <button onClick={()=>setEditMode(!editMode)} style={{padding:"7px 18px",borderRadius:8,border:"none",cursor:"pointer",fontSize:12,fontWeight:700,background:editMode?"#F7931A":"rgba(247,147,26,0.12)",color:editMode?"#000":"#F7931A"}}>{editMode?"✓ Guardar":"✏ Editar"}</button>
                </div>
              </div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap",padding:"12px 20px",borderBottom:"1px solid rgba(255,255,255,0.04)"}}>
                <span style={{fontSize:11,color:"#555570"}}>Filtrar:</span>
                {cats.map(c=><button key={c} onClick={()=>setFilterCat(c)} style={{padding:"4px 12px",borderRadius:20,border:"none",cursor:"pointer",fontSize:11,fontWeight:600,background:filterCat===c?"#F7931A":"rgba(255,255,255,0.05)",color:filterCat===c?"#000":"#888899"}}>{c}</button>)}
              </div>
              <div style={{display:"grid",gridTemplateColumns:"40px 1fr 110px 120px 100px 75px 70px",padding:"10px 20px",borderBottom:"1px solid rgba(255,255,255,0.04)",fontSize:11,color:"#555570",textTransform:"uppercase",letterSpacing:"0.6px"}}>
                {["#","Activo","Precio","Valor","Cantidad","24h%","Graf."].map((h,i)=><div key={h} style={{textAlign:i>1?"right":"left"}}>{h}</div>)}
              </div>
              {dr.map((coin,i)=>{
                const w=totalPort>0?(coin.value/totalPort)*100:0,isPos=coin.chg>=0;
                return(
                  <div key={coin.symbol} className="coin-row" style={{display:"grid",gridTemplateColumns:"40px 1fr 110px 120px 100px 75px 70px",padding:"11px 20px",borderBottom:"1px solid rgba(255,255,255,0.03)",background:i%2===0?"transparent":"rgba(255,255,255,0.01)",alignItems:"center"}}>
                    <div style={{fontSize:11,color:"#444460",fontFamily:"'Space Mono',monospace"}}>{(i+1).toString().padStart(2,"0")}</div>
                    <div style={{display:"flex",flexDirection:"column",gap:2}}>
                      <div style={{display:"flex",alignItems:"center",gap:6}}>
                        <span style={{fontSize:13,fontWeight:800,letterSpacing:"-0.3px"}}>{coin.symbol}</span>
                        <span style={{fontSize:10,fontWeight:700,padding:"2px 6px",borderRadius:20,color:CC[coin.cat]||"#888",background:(CC[coin.cat]||"#888")+"20"}}>{coin.cat}</span>
                      </div>
                      <span style={{fontSize:11,color:"#555570"}}>{coin.name}</span>
                    </div>
                    <div style={{textAlign:"right"}}><FlashPrice price={coin.price}/></div>
                    <div style={{textAlign:"right"}}>
                      <div style={{fontFamily:"'Space Mono',monospace",fontSize:13,color:coin.value>0?"#E8E8F0":"#333350",fontWeight:700}}>{fmtUSD(coin.value)}</div>
                      {coin.value>0&&<div style={{fontSize:10,color:"#555570"}}>{w.toFixed(1)}%</div>}
                    </div>
                    <div style={{textAlign:"right"}}>
                      {editMode?<input type="number" value={quantities[coin.symbol]||""} placeholder="0" onChange={e=>setQuantities(q=>({...q,[coin.symbol]:parseFloat(e.target.value)||0}))} style={{width:85,background:"rgba(247,147,26,0.08)",border:"1px solid rgba(247,147,26,0.3)",borderRadius:6,padding:"3px 6px",color:"#F7931A",fontSize:12,fontFamily:"'Space Mono',monospace",textAlign:"right",outline:"none"}}/>:
                      <span style={{fontFamily:"'Space Mono',monospace",fontSize:12,color:coin.qty>0?"#AAAACC":"#333350"}}>{coin.qty>0?coin.qty.toLocaleString("en-US",{maximumFractionDigits:6}):"—"}</span>}
                    </div>
                    <div style={{textAlign:"right",fontFamily:"'Space Mono',monospace",fontSize:12,fontWeight:700,color:isPos?"#00C853":"#FF3D00"}}>{coin.symbol!=="USDT"?fmtPct(coin.chg):"—"}</div>
                    <div style={{display:"flex",justifyContent:"flex-end"}}><Sparkline history={history[coin.symbol]} positive={isPos}/></div>
                  </div>
                );
              })}
              <div style={{display:"grid",gridTemplateColumns:"40px 1fr 110px 120px 100px 75px 70px",padding:"14px 20px",borderTop:"1px solid rgba(247,147,26,0.2)",background:"rgba(247,147,26,0.04)",alignItems:"center"}}>
                <div/><div style={{fontSize:12,fontWeight:800,color:"#F7931A"}}>TOTAL PORTAFOLIO</div><div/>
                <div style={{textAlign:"right",fontFamily:"'Space Mono',monospace",fontSize:14,fontWeight:800,color:"#F7931A"}}>{fmtUSD(totalPort)}</div>
                <div/><div style={{textAlign:"right",fontFamily:"'Space Mono',monospace",fontSize:12,fontWeight:700,color:totalChgPct>=0?"#00C853":"#FF3D00"}}>{fmtPct(totalChgPct)}</div><div/>
              </div>
            </div>
            <div style={{height:40}}/>
          </div>
        )}

        {tab==="operaciones"&&<FourCommas/>}
        {tab==="categorias"&&<Categories rows={rows} totalPort={totalPort}/>}
      </div>
    </div>
  );
}

function FourCommas(){
  const E={par:"",tipo:"LONG",qty:"",entrada:"",sl:"",tp:"",salida:"",resultado:"",fecha:""};
  const[trades,setTrades]=useState([
    {par:"BTC/USDT",tipo:"LONG",qty:0.05,entrada:65000,sl:63500,tp:68000,salida:67800,resultado:"WIN",fecha:"2025-01-05"},
    {par:"ETH/USDT",tipo:"LONG",qty:0.5,entrada:3200,sl:3100,tp:3500,salida:3480,resultado:"WIN",fecha:"2025-01-12"},
    {par:"SOL/USDT",tipo:"LONG",qty:5,entrada:165,sl:160,tp:185,salida:158,resultado:"LOSS",fecha:"2025-01-18"},
    {par:"BTC/USDT",tipo:"SHORT",qty:0.03,entrada:68500,sl:69500,tp:65000,salida:65200,resultado:"WIN",fecha:"2025-01-25"},
    {par:"BNB/USDT",tipo:"LONG",qty:2,entrada:560,sl:545,tp:610,salida:605,resultado:"WIN",fecha:"2025-02-02"},
  ]);
  const[nt,setNt]=useState(E);
  const[showForm,setShowForm]=useState(false);
  const cp=t=>{if(!t.entrada||!t.salida||!t.qty)return null;return t.tipo==="LONG"?(parseFloat(t.salida)-parseFloat(t.entrada))*parseFloat(t.qty):(parseFloat(t.entrada)-parseFloat(t.salida))*parseFloat(t.qty);};
  const wins=trades.filter(t=>t.resultado==="WIN").length;
  const totalPnl=trades.reduce((s,t)=>s+(cp(t)||0),0);
  const wr=trades.length>0?(wins/trades.length)*100:0;
  return(
    <div style={{animation:"fadeIn 0.3s ease"}}>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))",gap:14,padding:"24px 0 0"}}>
        {[{l:"Total Trades",v:trades.length,c:"#F7931A"},{l:"Ganadas",v:wins,c:"#00C853"},{l:"Perdidas",v:trades.filter(t=>t.resultado==="LOSS").length,c:"#FF3D00"},{l:"Win Rate",v:wr.toFixed(1)+"%",c:wr>=50?"#00C853":"#FF3D00"},{l:"P&L Total",v:(totalPnl>=0?"+":"")+"$"+totalPnl.toFixed(2),c:totalPnl>=0?"#00C853":"#FF3D00"}].map(({l,v,c})=>(
          <div key={l} style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.06)",borderTop:`3px solid ${c}`,borderRadius:12,padding:"18px 20px"}}>
            <div style={{fontSize:11,color:"#555570",textTransform:"uppercase",letterSpacing:"0.8px",marginBottom:8}}>{l}</div>
            <div style={{fontSize:22,fontWeight:800,color:c,letterSpacing:"-0.5px"}}>{v}</div>
          </div>
        ))}
      </div>
      <div style={{display:"flex",justifyContent:"flex-end",padding:"20px 0 8px"}}>
        <button onClick={()=>setShowForm(!showForm)} style={{padding:"9px 20px",borderRadius:8,border:"none",cursor:"pointer",fontSize:13,fontWeight:700,background:showForm?"rgba(255,255,255,0.06)":"linear-gradient(135deg,#F7931A,#E65100)",color:showForm?"#888":"#000"}}>{showForm?"✕ Cancelar":"+ Nueva Operación"}</button>
      </div>
      {showForm&&(
        <div style={{background:"rgba(247,147,26,0.05)",border:"1px solid rgba(247,147,26,0.2)",borderRadius:12,padding:20,marginBottom:16,display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:12,animation:"fadeIn 0.2s ease"}}>
          {[["par","Par","BTC/USDT"],["fecha","Fecha","2025-01-01"],["qty","Cantidad","0.05"],["entrada","Entrada","65000"],["sl","Stop Loss","63500"],["tp","Take Profit","68000"],["salida","Salida","67800"]].map(([key,label,ph])=>(
            <div key={key}><div style={{fontSize:11,color:"#666680",marginBottom:4}}>{label}</div><input style={{width:"100%",background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:6,padding:"7px 10px",color:"#E8E8F0",fontSize:13,outline:"none"}} placeholder={ph} value={nt[key]} onChange={e=>setNt(n=>({...n,[key]:e.target.value}))}/></div>
          ))}
          <div><div style={{fontSize:11,color:"#666680",marginBottom:4}}>Tipo</div><select style={{width:"100%",background:"#1A1A2E",border:"1px solid rgba(255,255,255,0.1)",borderRadius:6,padding:"7px 10px",color:"#E8E8F0",fontSize:13,outline:"none"}} value={nt.tipo} onChange={e=>setNt(n=>({...n,tipo:e.target.value}))}><option value="LONG">LONG</option><option value="SHORT">SHORT</option></select></div>
          <div><div style={{fontSize:11,color:"#666680",marginBottom:4}}>Resultado</div><select style={{width:"100%",background:"#1A1A2E",border:"1px solid rgba(255,255,255,0.1)",borderRadius:6,padding:"7px 10px",color:"#E8E8F0",fontSize:13,outline:"none"}} value={nt.resultado} onChange={e=>setNt(n=>({...n,resultado:e.target.value}))}><option value="">—</option><option value="WIN">WIN</option><option value="LOSS">LOSS</option></select></div>
          <div style={{display:"flex",alignItems:"flex-end"}}><button onClick={()=>{if(!nt.par)return;setTrades(t=>[...t,nt]);setNt(E);setShowForm(false);}} style={{width:"100%",padding:8,borderRadius:8,border:"none",cursor:"pointer",fontSize:13,fontWeight:700,background:"linear-gradient(135deg,#00C853,#00875A)",color:"#fff"}}>✓ Agregar</button></div>
        </div>
      )}
      <div style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:14,overflowX:"auto"}}>
        <div style={{display:"grid",gridTemplateColumns:"80px 110px 60px 65px 95px 95px 95px 95px 80px 90px",padding:"10px 16px",borderBottom:"1px solid rgba(255,255,255,0.05)",fontSize:10,color:"#444460",textTransform:"uppercase",letterSpacing:"0.6px",minWidth:900}}>
          {["Fecha","Par","Tipo","Cant.","Entrada","Stop Loss","Take Profit","Salida","Result.","P&L"].map(h=><div key={h} style={{textAlign:"right",...(h==="Par"||h==="Tipo"?{textAlign:"left"}:{})}}>{h}</div>)}
        </div>
        {trades.map((t,i)=>{const pnl=cp(t);const isWin=t.resultado==="WIN";return(
          <div key={i} style={{display:"grid",gridTemplateColumns:"80px 110px 60px 65px 95px 95px 95px 95px 80px 90px",padding:"11px 16px",alignItems:"center",borderBottom:"1px solid rgba(255,255,255,0.025)",background:i%2===0?"transparent":"rgba(255,255,255,0.01)",minWidth:900}}>
            <div style={{fontSize:11,color:"#444460",fontFamily:"'Space Mono',monospace"}}>{t.fecha}</div>
            <div style={{fontSize:13,fontWeight:700}}>{t.par}</div>
            <div style={{fontSize:11,fontWeight:700,padding:"2px 8px",borderRadius:4,textAlign:"center",background:t.tipo==="LONG"?"rgba(0,200,83,0.15)":"rgba(255,61,0,0.15)",color:t.tipo==="LONG"?"#00C853":"#FF3D00"}}>{t.tipo}</div>
            <div style={{textAlign:"right",fontFamily:"'Space Mono',monospace",fontSize:12,color:"#AAAACC"}}>{t.qty}</div>
            <div style={{textAlign:"right",fontFamily:"'Space Mono',monospace",fontSize:12,color:"#00C853"}}>${parseFloat(t.entrada).toLocaleString()}</div>
            <div style={{textAlign:"right",fontFamily:"'Space Mono',monospace",fontSize:12,color:"#1D6FD1"}}>${parseFloat(t.sl).toLocaleString()}</div>
            <div style={{textAlign:"right",fontFamily:"'Space Mono',monospace",fontSize:12,color:"#F7931A"}}>${parseFloat(t.tp).toLocaleString()}</div>
            <div style={{textAlign:"right",fontFamily:"'Space Mono',monospace",fontSize:12,color:"#FF3D00"}}>${parseFloat(t.salida).toLocaleString()}</div>
            <div style={{textAlign:"center"}}><span style={{fontSize:11,fontWeight:700,padding:"3px 8px",borderRadius:20,background:isWin?"rgba(0,200,83,0.15)":t.resultado?"rgba(255,61,0,0.15)":"transparent",color:isWin?"#00C853":t.resultado?"#FF3D00":"#555570"}}>{t.resultado||"—"}</span></div>
            <div style={{textAlign:"right",fontFamily:"'Space Mono',monospace",fontSize:12,fontWeight:700,color:pnl===null?"#444460":pnl>=0?"#00C853":"#FF3D00"}}>{pnl===null?"—":(pnl>=0?"+":"")+"$"+pnl.toFixed(2)}</div>
          </div>
        );})}
        <div style={{display:"grid",gridTemplateColumns:"80px 110px 60px 65px 95px 95px 95px 95px 80px 90px",padding:"12px 16px",borderTop:"1px solid rgba(247,147,26,0.2)",background:"rgba(247,147,26,0.04)",minWidth:900}}>
          <div style={{gridColumn:"1/9",fontSize:12,fontWeight:800,color:"#F7931A"}}>P&L ACUMULADO</div><div/>
          <div style={{textAlign:"right",fontFamily:"'Space Mono',monospace",fontSize:14,fontWeight:800,color:totalPnl>=0?"#00C853":"#FF3D00"}}>{(totalPnl>=0?"+":"")+"$"+totalPnl.toFixed(2)}</div>
        </div>
      </div>
      <div style={{height:40}}/>
    </div>
  );
}

function Categories({rows,totalPort}){
  const bc={};
  rows.forEach(r=>{if(!bc[r.cat])bc[r.cat]={value:0,coins:[],change:0};bc[r.cat].value+=r.value;bc[r.cat].coins.push(r.symbol);bc[r.cat].change+=r.value*(r.chg/100);});
  return(
    <div style={{animation:"fadeIn 0.3s ease",paddingTop:24}}>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(280px,1fr))",gap:16}}>
        {Object.entries(bc).sort((a,b)=>b[1].value-a[1].value).map(([cat,data])=>{
          const pct=totalPort>0?(data.value/totalPort)*100:0,color=CC[cat]||"#888",chgPct=data.value>0?(data.change/(data.value-data.change))*100:0;
          return(
            <div key={cat} style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.06)",borderLeft:`4px solid ${color}`,borderRadius:12,padding:"18px 20px"}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:12}}>
                <div><div style={{fontSize:14,fontWeight:800}}>{cat}</div><div style={{fontSize:11,color:"#555570",marginTop:2}}>{data.coins.join(" · ")}</div></div>
                <div style={{textAlign:"right"}}>
                  <div style={{fontSize:16,fontWeight:800,color,fontFamily:"'Space Mono',monospace"}}>{pct.toFixed(1)}%</div>
                  <div style={{fontSize:11,color:chgPct>=0?"#00C853":"#FF3D00",marginTop:2}}>{(chgPct>=0?"+":"")+chgPct.toFixed(2)}% hoy</div>
                </div>
              </div>
              <div style={{height:4,background:"rgba(255,255,255,0.05)",borderRadius:2,marginBottom:10}}>
                <div style={{height:4,borderRadius:2,width:`${Math.min(pct*3,100)}%`,background:color}}/>
              </div>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:12}}>
                <span style={{color:"#666680"}}>{data.coins.length} activos</span>
                <span style={{fontFamily:"'Space Mono',monospace",fontWeight:700}}>${data.value.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2})}</span>
              </div>
            </div>
          );
        })}
      </div>
      <div style={{height:40}}/>
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
